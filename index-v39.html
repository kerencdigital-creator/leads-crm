  const state={screen:'dashboard',userId:'manager',isDark:true,salesDate:today,selectedClientId:'C-1001',workerId:'',workerTab:'clients',workerClientId:'',query:'',statusFilter:'הכל',ownerFilter:'הכל',taskFilter:'הכל',workerTaskFilter:'הכל',roundRobinIndex:0};

  function renderApp(){const u=activeUser();document.getElementById('app').innerHTML=`<div dir="rtl" class="app ${state.isDark?'dark':'light'}"><div class="shell"><aside class="sidebar"><div class="logo-card"><small>CRM עובדים</small><h2>ניהול לקוחות ומכירות</h2><small>משתמש אישי + מנהל לידים</small></div>${panel(`${themeToggle()}<label class="muted">כניסה כמשתמש</label><select data-change="user">${workers.map(w=>`<option value="${w.id}" ${w.id===state.userId?'selected':''}>${esc(w.name)} · ${esc(w.role)}</option>`).join('')}</select>`,'grid')}<nav style="margin-top:14px">${u.isManager?sideBtn('dashboard','▥','דשבורד מנהלים'):''}${sideBtn('home','⌂','מסך בית')}${!isTaskOnly(state.userId)?sideBtn('clients','▤','טבלת לקוחות'):''}${sideBtn('tasks','✓','משימות')}${sideBtn('reports','▥','דוחות ודיווחים')}${u.isManager?sideBtn('manager','♟','מנהל לידים'):''}</nav></aside><main class="main"><div class="container">${renderHeader()}${renderScreen()}</div></main></div>${renderModal()}</div>`}

  function renderDashboard(){const m=metrics(),vc=visibleClients(),ws=workerStats();const statusStats=clientStatuses.map(s=>({status:s,count:vc.filter(c=>c.status===s).length}));const best=[...ws].sort((a,b)=>(b.salesMonthly+b.revenue+b.clientsTotal*12+b.doneTasks*5)-(a.salesMonthly+a.revenue+a.clientsTotal*12+a.doneTasks*5))[0];return `<div class="grid">${panel(`<div><h3>פילטור סך המכירות לפי תאריך</h3><p class="muted">מציג את סך המכירות והסגירות בתאריך שנבחר.</p></div><div style="max-width:330px;width:100%"><input type="date" data-change="sales-date" value="${state.salesDate}"><p><b>${money(m.salesByDate)}</b> · ${m.closedByDate} סגירות</p></div>`,'row between')}<section class="grid stats">${statCard('▤','לידים שנכנסו היום',m.todayLeads,'לחיצה תציג לידים חדשים','filter-new')}${statCard('✓','סגירות',vc.filter(c=>c.status==='נסגר / נמכר').length,'אחוז המרה כללי','filter-closed')}${statCard('⏰','תזכורות פתוחות',vc.filter(c=>c.followUpAt&&c.status!=='נסגר / נמכר').length,'Follow-up פתוח','clients')}${statCard('✓','משימות פתוחות',m.openTasks,`${m.doneTasks} הושלמו`,'tasks-open')}${statCard('₪','סך מכירות',money(m.salesByDate),formatDate(state.salesDate),'reports')}</section><div class="grid content-grid">${panel(`<div class="row between"><span class="pill">Team Performance</span><div><h3>ביצועים לפי עובד</h3><p class="muted">לחצי על עובד כדי לפתוח תיקי לקוחות, משימות ודוח מכירות יומי.</p></div></div><div class="grid worker-grid" style="margin-top:18px">${ws.map(w=>`<button type="button" class="worker-card" data-worker="${w.id}"><div class="row between"><div><b>${esc(w.name)}</b><p>${esc(w.role)}</p></div><b>${money(w.salesDaily)}</b></div><p>יומי: ${money(w.salesDaily)} · שבועי: ${money(w.salesWeekly)} · חודשי: ${money(w.salesMonthly)}</p><p>${w.clientsTotal} לידים · ${w.openTasks} משימות פתוחות · ${w.doneTasks} הושלמו</p><div class="progress"><span style="width:${Math.min(100,Math.max(8,w.clientsTotal*12+w.doneTasks*8))}%"></span></div></button>`).join('')}</div>`)}${panel(`<div class="row between"><span class="pill">Overview</span><div><h3>מצב לידים כללי</h3><p class="muted">כל סטטוס לחיץ ומוביל לרשימת הלקוחות הרלוונטיים.</p></div></div><div class="grid two-col" style="margin-top:18px;align-items:center"><div class="status-grid">${statusStats.map(item=>{const width=vc.length?Math.max(6,Math.round(item.count/vc.length*100)):6;return `<button type="button" class="status-row" data-filter-status="${esc(item.status)}"><div class="row between"><b>${esc(item.status)}</b><span>${item.count}</span></div><div class="progress"><span style="width:${width}%"></span></div></button>`}).join('')}</div><div class="circle"><div><b>0%</b><p>המרה</p></div></div></div><div class="grid summary-row"><button class="mini-card" type="button" data-nav="clients"><p>לידים פתוחים</p><b>${vc.filter(c=>!['נסגר / נמכר','לא רלוונטי'].includes(c.status)).length}</b></button><button class="mini-card" type="button" data-action="tasks-open"><p>איחורים במשימות</p><b>0</b></button><button class="mini-card" type="button" ${best?`data-worker="${best.id}"`:''}><p>עובד בולט</p><b>${esc(best?.name||'—')}</b></button></div>`)}</div></div>`}
  function renderHome(){const m=metrics(),u=activeUser();return `<div class="grid">${panel(`<div><h3>סיכום מכירות אישי</h3><p class="muted">מסך הבית מציג מכירות היום ופילטור לפי תאריך.</p></div><div style="max-width:330px;width:100%"><input type="date" data-change="sales-date" value="${state.salesDate}"><p><b>מכירות בתאריך: ${money(m.salesByDate)}</b></p></div>`,'row between')}<section class="grid stats">${statCard('₪','סך מכירות היום',money(m.salesToday),'')}${statCard('▥','מכירות לפי תאריך',money(m.salesByDate),formatDate(state.salesDate))}${!isTaskOnly(state.userId)?statCard('▤','לקוחות בטיפול',visibleClients().length,'','clients'):''}${statCard('✓','משימות פתוחות',m.openTasks,'','tasks-open')}${statCard('💬','דיווחים',visibleReports().length,'','reports')}</section></div>`}
  function selectedClient(){return clients.find(c=>c.id===state.selectedClientId)||clients[0]}

client="${c.id}" value="${esc(c.product)}"></td><td><select data-client-field="status" data-client="${c.id}">${clientStatuses.map(s=>`<option ${s===c.status?'selected':''}>${esc(s)}</option>`).join('')}</select></td><td><select data-client-field="ownerId" data-client="${c.id}" ${!activeUser().isManager?'disabled':''}>${salesWorkers().map(w=>`<option value="${w.id}" ${w.id===c.ownerId?'selected':''}>${esc(w.name)}</option>`).join('')}</select></td><td><input type="number" data-client-field="saleAmount" data-client="${c.id}" value="${Number(c.saleAmount||0)}"></td><td><button type="button" class="primary" data-select-client="${c.id}">תיק לקוח</button></td></tr>`).join('')}</tbody></table></div>`)}</section>${renderClientFile(selectedClient())}</div>`}
  function renderClientFile(c){if(!c)return panel('<p>בחרי לקוח להצגה.</p>');return panel(`<div class="row between"><div><h3>${esc(c.fullName)}</h3><p class="muted">${esc(c.phone)} · ${esc(c.email||'ללא אימייל')}</p></div><span class="pill">${esc(c.status)}</span></div><div class="mini-card grid two-col"><p>עיר: <b>${esc(c.city||'—')}</b></p><p>מוצר: <b>${esc(c.product)}</b></p><p>עובד: <b>${esc(getWorker(c.ownerId).name)}</b></p><p>מכירה: <b>${money(c.saleAmount)}</b></p></div><div class="actions-row"><button type="button" class="primary wa" data-whats="${c.id}">💬 פתיחת WhatsApp</button></div><h4>תפריט משימות לעובדים</h4><div class="form-grid-3"><select id="task-type">${clientTaskTypes.map(t=>`<option>${esc(t)}</option>`).join('')}</select><select id="task-owner">${workers.filter(w=>!w.isManager).map(w=>`<option value="${w.id}" ${w.id===c.ownerId?'selected':''}>${esc(w.name)} · ${esc(w.role)}</option>`).join('')}</select><input id="task-date" type="date" value="${today}"></div><input id="task-note" placeholder="הערה למשימה"><button type="button" class="primary" data-add-task-client="${c.id}">הוספת משימה לעובד</button>${renderTasksList(c.tasks||[],c.id)}<h4>הוספת פעולה / סיכום שיחה</h4><textarea id="action-text" placeholder="מה קרה בשיחה? מה סוכם? האם צריך המשך טיפול?"></textarea><button type="button" class="btn ghost" data-save-action="${c.id}">שמירת פעולה בהיסטוריה</button><div class="timeline mini-card">${(c.actions||[]).map(a=>`<div class="mini-card"><b>${esc(a.type)} · ${esc(getWorker(a.userId).name)}</b><p>${esc(a.text)}</p><small>${formatDate(a.date)}</small></div>`).join('')||'<p class="muted">אין פעולות עדיין.</p>'}</div><h4>דיווח פנימי</h4><textarea id="report-text" placeholder="דיווח פנימי למנהל/ת"></textarea><button type="button" class="btn ghost" data-save-report="${c.id}">שמירת דיווח</button><div class="timeline mini-card">${(c.reports||[]).map(r=>`<div class="mini-card"><b>${esc(getWorker(r.userId).name)} · ${formatDate(r.date)}</b><p>${esc(r.text)}</p></div>`).join('')||'<p class="muted">אין דיווחים עדיין.</p>'}</div>`)}
  function renderTasksList(tasks,clientId=''){return `<div class="task-list">${tasks.length?tasks.map(t=>`<div class="mini-card"><div class="row between"><div><b>${esc(t.type)}</b><p>אחראי: ${esc(getWorker(t.ownerId).name)} · יעד: ${formatDate(t.dueDate)}</p>${t.note?`<small>${esc(t.note)}</small>`:''}</div><span class="pill">${esc(t.status)}</span></div><div class="actions-row">${taskStatuses.map(s=>`<button type="button" data-task-status="${esc(s)}" data-task="${t.id}" data-client-task="${clientId}">${esc(s)}</button>`).join('')}<button type="button" class="danger" data-delete-task="${t.id}" data-client-task="${clientId}">מחיקה</button></div></div>`).join(''):'<p class="muted">אין משימות להצגה.</p>'}</div>`}

  function renderReports(){const day=sumReports(visibleSalesReports().filter(r=>r.date===state.salesDate));const week=sumReports(visibleSalesReports().filter(r=>sameWeek(r.date,state.salesDate)));const month=sumReports(visibleSalesReports().filter(r=>sameMonth(r.date,state.salesDate)));const m=metrics();return `<div class="grid"><section class="grid stats">${statCard('₪','מכירות ביום שנבחר',money(day),formatDate(state.salesDate))}${statCard('▥','מכירות שבועיות',money(week),'לפי השבוע של התאריך שנבחר')}${statCard('▥','מכירות חודשיות',money(month),'לפי החודש של התאריך שנבחר')}${statCard('▤','תיקי לקוחות',visibleClients().length,'')}${statCard('✓','משימות פתוחות',m.openTasks,'')}</section>${panel(`<div class="row between"><div><h3>דוחות ודיווחים על המסך</h3><p class="muted">כולל דוח מכירות יומי לעובדים, לקוחות, משימות ודיווחי משתמשים.</p></div><button type="button" class="primary" data-action="download-excel">⬇ הורדה לאקסל</button></div><div class="table-wrap" style="margin-top:18px"><table><thead><tr><th>תאריך</th><th>עובד</th><th>לקוחות קיימים</th><th>לקוחות חדשים</th><th>סה״כ יומי</th><th>הערה</th></tr></thead><tbody>${visibleSalesReports().map(r=>`<tr><td>${formatDate(r.date)}</td><td>${esc(getWorker(r.workerId).name)}</td><td>${money(r.existingClientsSales)}</td><td>${money(r.newClientsSales)}</td><td><b>${money(reportTotal(r))}</b></td><td>${esc(r.note)}</td></tr>`).join('')}</tbody></table></div><div class="grid two-col" style="margin-top:18px"><div><h4>דיווחים אחרונים</h4>${visibleReports().map(r=>`<button type="button" class="client-row" data-open-client="${r.clientId}"><b>${esc(r.clientName)} · ${esc(getWorker(r.userId).name)}</b><p>${esc(r.text)}</p><small>${formatDate(r.date)}</small></button>`).join('')||'<p class="muted">אין דיווחים.</p>'}</div><div><h4>דוח עובדים</h4>${workerStats().filter(w=>activeUser().isManager||w.id===state.userId).map(w=>`<div class="mini-card"><div class="row between"><div><b>${esc(w.name)}</b><p>${w.clientsTotal} לקוחות · ${w.ope   function getSalesDraft(workerId,date=state.salesDate){const r=salesReports.find(x=>x.workerId===workerId&&x.date===date);return{date,existing:r?Number(r.existingClientsSales||0):'',newSales:r?Number(r.newClientsSales||0):'',note:r?.note||''}}
  function renderModal(){if(!state.workerId)return'';const w=getWorker(state.workerId),taskOnly=isTaskOnly(w.id),wc=taskOnly?[]:clients.filter(c=>c.ownerId===w.id),raw=flatTasks().filter(t=>t.ownerId===w.id),wt=state.workerTaskFilter==='הכל'?raw:state.workerTaskFilter==='פתוחות'?raw.filter(t=>t.status!=='משימה הושלמה'):raw.filter(t=>t.status===state.workerTaskFilter),stats=workerStats().find(x=>x.id===w.id)||{},selected=clients.find(c=>c.id===state.workerClientId);return `<div class="modal-backdrop" data-action="close-worker"><div class="modal modal-wide" data-stop><div class="modal-header"><div><h2>${esc(selected?selected.fullName:w.name)}</h2><p class="muted">${selected?`תיק לקוח מתוך כרטיס העובד · ${esc(w.name)}`:`${esc(w.role)} · ${taskOnly?'משימות בלבד':wc.length+' לקוחות'} · ${wt.length} משימות`}</p></div><div class="actions-row">${selected?'<button type="button" class="primary" data-action="back-worker">חזרה לעובד</button>':''}${!selected&&!taskOnly?`<button type="button" class="btn ${state.workerTab!=='clients'?'ghost':''}" data-worker-tab="clients">לידים של העובד</button>`:''}${!selected?`<button type="button" class="btn ${state.workerTab!=='tasks'?'ghost':''}" data-worker-tab="tasks">משימות של העובד</button>`:''}${!selected&&!taskOnly?`<button type="button" class="btn ${state.workerTab!=='load'?'ghost':''}" data-worker-tab="load">טעינת טבלת לקוחות</button>`:''}<button type="button" class="btn ghost" data-action="close-worker">✕ סגירה</button></div></div>${selected?`<div class="grid client-file-grid">${renderClientFile(selected)}${panel(`<h3>היסטוריית לקוח</h3><p class="muted">כל שיחה, WhatsApp, הצעת מחיר, סיכום ומשימה נשמרים כאן לפי תאריך.</p><div class="grid two-col"><div class="mini-card"><p>תאריך פתיחה</p><b>${formatDate(selected.createdAt)}</b></div><div class="mini-card"><p>פעולה אחרונה</p><b>${esc(selected.lastAction)}</b></div></div>`)}</div>`:renderWorkerContent(w,wc,wt,stats,taskOnly)}</div></div>`}
  function renderWorkerContent(w,wc,wt,stats,taskOnly){let body=`<div class="grid"><section class="grid stats">${!taskOnly?statCard('▤','לידים',wc.length,'','worker-tab-clients'):''}${statCard('✓','משימות פתוחות',stats.openTasks||0,'','worker-tab-tasks')}${statCard('✓','הושלמו',stats.doneTasks||0,'','worker-tab-done')}${!taskOnly?statCard('₪','מכירות יומיות',money(stats.salesDaily),''):''}${!taskOnly?statCard('₪','מכירות חודשיות',money(stats.salesMonthly),''):''}</section>`;if(!taskOnly){const d=getSalesDraft(w.id,state.salesDate);body+=`<div class="grid content-grid">${panel(`<h3>דוח מכירות יומי</h3><p class="muted">הזיני בנפרד מכירות ללקוחות קיימים וללקוחות חדשים. החישוב נשמר לפי עובד ותאריך.</p><div class="form-grid"><label>תאריך<input type="date" id="daily-date" value="${esc(d.date)}"></label><label>לקוחות קיימים<input type="number" min="0" id="daily-existing" value="${esc(d.existing)}" placeholder="0"></label><label>לקוחות חדשים<input type="number" min="0" id="daily-new" value="${esc(d.newSales)}" placeholder="0"></label><label>הערה<input id="daily-note" value="${esc(d.note)}" placeholder="לדוגמה: סיכום סגירות היום"></label></div><button type="button" class="primary" style="margin-top:12px" data-save-daily="${w.id}">שמירת דוח מכירות יומי</button>`)}${panel(`<h3>סה״כ מכירות</h3><p class="muted">החישוב מתבצע לפי דוחות המכירה היומיים שנשמרו.</p><div class="grid summary-row"><div class="mini-card"><p>יומי</p><b>${money(stats.salesDaily)}</b></div><div class="mini-card"><p>שבועי</p><b>${money(stats.salesWeekly)}</b></div><div class="mini-card"><p>חודשי</p><b>${money(stats.salesMonthly)}</b></div></div><div class="grid two-col" style="margin-top:12px"><div class="mini-card"><p>לקוחות חדשים היום</p><b>${money(stats.newDaily)}</b></div><div class="mini-card"><p>לקוחות קיימים היום</p><b>${money(stats.existingDaily)}</b></div></div>`)}</div>`}if(state.workerTab==='clients'&&!taskOnly)body+=renderWorkerClients(wc);if(state.workerTab==='tasks')body+=renderWorkerTasks(wt,taskOnly,wc);if(state.workerTab==='load'&&!taskOnly)body+=renderWorkerLoad();return body+'</div>'}
  function renderWorkerClients(wc){return panel(`<div class="row between"><h3>טבלת לקוחות של ${esc(getWorker(state.workerId).name)}</h3><button class="primary" type="button" data-worker-tab="load">+ טעינה / הוספה</button></div><div class="table-wrap"><table><thead><tr><th>שם</th><th>טלפון</th><th>מוצר</th><th>סטטוס</th><th>מכירה</th><th>פתיחה</th></tr></thead><tbody>${wc.map(c=>`<tr><td><input data-client-field="fullName" data-client="${c.id}" value="${esc(c.fullName)}"></td><td><input data-client-field="phone" data-client="${c.id}" value="${esc(c.phone)}"></td><td><input data-client-field="product" data-client="${c.id}" value="${esc(c.product)}"></td><td><select data-client-field="status" data-client="${c.id}">${clientStatuses.map(s=>`<option ${s===c.status?'selected':''}>${esc(s)}</option>`).join('')}</select></td><td><input type="number" data-client-field="saleAmount" data-client="${c.id}" value="${Number(c.saleAmount||0)}"></td><td><button type="button" class="primary" data-open-client-panel="${c.id}">תיק לקוח</button></td></tr>`).join('')}</tbody></table></div>`)}
  function renderWorkerTasks(wt,taskOnly,wc){return `<div class="grid content-grid">${panel(`<div class="row between"><h3>משימות של ${esc(getWorker(state.workerId).name)}</h3><select style="max-width:210px" data-change="worker-task-filter"><option>הכל</option><option ${state.workerTaskFilter==='פתוחות'?'selected':''}>פתוחות</option>${taskStatuses.map(s=>`<option ${s===state.workerTaskFilter?'selected':''}>${esc(s)}</option>`).join('')}</select></div><div class="grid">${wt.map(t=>`<div class="mini-card"><div class="row between"><div><b>${esc(t.clientId?t.clientName:'משימה פנימית')}</b><p>${esc(t.type)}</p><small>יעד: ${formatDate(t.dueDate)}</small></div><select style="max-width:210px" data-task-status-select="${t.id}" data-client-task="${t.clientId}">${taskStatuses.map(s=>`<option ${s===t.status?'selected':''}>${esc(s)}</option>`).join('')}</select></div>${t.clientId?`<button type="button" class="primary" data-open-client-panel="${t.clientId}">תיק לקוח</button>`:'<span class="pill">ללא תיק לקוח</span>'}</div>`).join('')||'<p class="muted">אין משימות.</p>'}</div>`)}${panel(`<h3>${taskOnly?'הוספת משימה רגילה לעובד':'הוספת משימה לעובד'}</h3>${!taskOnly?`<select id="worker-task-client"><option value="">ללא לקוח מקושר</option>${wc.map(c=>`<option value="${c.id}">${esc(c.fullName)}</option>`).join('')}</select>`:''}<select id="worker-task-type">${(taskOnly?employeeTaskTypes:clientTaskTypes).map(t=>`<option>${esc(t)}</option>`).join('')}</select><input type="date" id="worker-task-date" value="${today}"><input id="worker-task-note" placeholder="הערה למשימה"><button type="button" class="primary" data-action="add-worker-task">הוספת משימה</button>`)}</div>`}
  function renderWorkerLoad(){return `<div class="grid two-col">${panel(`<h3>הוספת לקוח לעובד</h3><input id="worker-new-full" placeholder="שם מלא"><input id="worker-new-phone" placeholder="טלפון"><input id="worker-new-city" placeholder="עיר"><input id="worker-new-email" placeholder="אימייל"><input id="worker-new-product" placeholder="מוצר"><button type="button" class="primary" data-action="add-client-worker">הוספת לקוח לעובד</button>`)}${panel(`<h3>טעינת טבלת לקוחות</h3><p class="muted">כל שורה: שם, טלפון, עיר, אימייל, מוצר.</p><textarea id="worker-bulk-text"></textarea><button type="button" class="primary" data-action="load-bulk-worker">טעינת לקוחות לעובד</button>`)}</div>`}
  function parseRows(text){return String(text||'').replaceAll(String.fromCharCode(13),'').replaceAll(String.fromCharCode(9),',').split(String.fromCharCode(10)).map(r=>r.trim()).filter(Boolean).map(r=>r.split(',').map(x=>x.trim()))}
  function createClient(cols,ownerId,index){const [fullName='',phone='',city='',email='',product='']=cols;return{id:'C-'+Date.now()+'-'+index,fullName:fullName||'לקוח '+(index+1),phone,email,city,product:product||'לא צוין',source:'טעינה מטבלה',status:'חדש',ownerId,createdAt:today,followUpAt:today,saleAmount:0,saleDate:'',lastAction:'נטען מטבלה',actions:[{id:'A-'+Date.now()+'-'+index,userId:state.userId,type:'טעינת לקוח',text:'לקוח נטען מטבלה',date:today}],reports:[],tasks:[]}}
  function updateClient(id,patch){clients=clients.map(c=>c.id===id?{...c,...patch}:c);save();renderApp()}
  function updateTask(clientId,taskId,patch){if(!clientId){standaloneTasks=standaloneTasks.map(t=>t.id===taskId?{...t,...patch}:t)}else{clients=clients.map(c=>c.id===clientId?{...c,tasks:(c.tasks||[]).map(t=>t.id===taskId?{...t,...patch}:t),lastAction:patch.status?'משימה עודכנה ל-'+patch.status:c.lastAction}:c)}save();renderApp()}
  function deleteTask(clientId,taskId){if(!clientId){standaloneTasks=standaloneTasks.filter(t=>t.id!==taskId)}else{clients=clients.map(c=>c.id===clientId?{...c,tasks:(c.tasks||[]).filter(t=>t.id!==taskId),lastAction:'משימה נמחקה'}:c)}save();renderApp()}
  function addAction(clientId){const txt=($('#action-text')?.value||'').trim();if(!txt)return;clients=clients.map(c=>c.id===clientId?{...c,actions:[{id:'A-'+Date.now(),userId:state.userId,type:'פעולה מול לקוח',text:txt,date:today},...(c.actions||[])],lastAction:txt}:c);state.selectedClientId=clientId;save();renderApp()}
  function addReport(clientId){const txt=($('#report-text')?.value||'').trim();if(!txt)return;clients=clients.map(c=>c.id===clientId?{...c,reports:[{id:'R-'+Date.now(),userId:state.userId,text:txt,date:today},...(c.reports||[])],lastAction:'נוסף דיווח פנימי'}:c);state.selectedClientId=clientId;save();renderApp()}
  function normalizePhone(phone){const d=String(phone||'').replace(/[^0-9]/g,'');if(!d)return'';if(d.startsWith('972'))return d;if(d.startsWith('0'))return'972'+d.slice(1);return d}
  function openWhats(clientId){const c=clients.find(x=>x.id===clientId);if(!c)return;const p=normalizePhone(c.phone);if(p)window.open('https://wa.me/'+p,'_blank','noopener,noreferrer');clients=clients.map(x=>x.id===clientId?{...x,actions:[{id:'A-'+Date.now(),userId:state.userId,type:'WhatsApp',text:'נפתח WhatsApp ללקוח ללא הודעה מוכנה',date:today},...(x.actions||[])],lastAction:'נפתח WhatsApp ללקוח',status:x.status==='חדש'?'בטיפול':x.status}:x);save();renderApp()}
  function downloadExcel(){const ex=v=>String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const table=(title,headers,rows)=>`<h2>${ex(title)}</h2><table border="1"><thead><tr>${headers.map(h=>`<th>${ex(h)}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(c=>`<td>${ex(c)}</td>`).join('')}</tr>`).join('')}</tbody></table><br/>`;const ws=workerStats().filter(w=>activeUser().isManager||w.id===state.userId);const html='<html dir="rtl"><head><meta charset="UTF-8"></head><body>'+table('לקוחות',['שם','טלפון','עיר','מוצר','סטטוס','עובד','מכירה','תאריך מכירה','פעולה אחרונה'],visibleClients().map(c=>[c.fullName,c.phone,c.city,c.product,c.status,getWorker(c.ownerId).name,c.saleAmount,formatDate(c.saleDate),c.lastAction]))+table('דוח מכירות יומי לפי עובד',['תאריך','עובד','מכירות ללקוחות קיימים','מכירות ללקוחות חדשים','סהכ יומי','הערה'],visibleSalesReports().map(r=>[formatDate(r.date),getWorker(r.workerId).name,r.existingClientsSales,r.newClientsSales,reportTotal(r),r.note]))+table('סיכומי מכירות עובדים',['עובד','יומי','שבועי','חודשי','לקוחות חדשים היום','לקוחות קיימים היום'],ws.map(w=>[w.name,w.salesDaily,w.salesWeekly,w.salesMonthly,w.newDaily,w.existingDaily]))+table('משימות',['לקוח','משימה','סטטוס','אחראי','יעד','הערה'],visibleTasks().map(t=>[t.clientName,t.type,t.status,getWorker(t.ownerId).name,formatDate(t.dueDate),t.note]))+table('דיווחים',['לקוח','משתמש','תאריך','דיווח'],visibleReports().map(r=>[r.clientName,getWorker(r.userId).name,formatDate(r.date),r.text]))+'</body></html>';const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='crm-report-'+new Date().toISOString().slice(0,10)+'.xls';document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(url)}
  document.addEventListener('click',e=>{const stop=e.target.closest('[data-stop]');if(stop)return;const nav=e.target.closest('[data-nav]');if(nav){state.screen=nav.dataset.nav;renderApp();return}const act=e.target.closest('[data-action]');if(act){const a=act.dataset.action;if(a==='theme'){state.isDark=!state.isDark;renderApp()}if(a==='close-worker'){state.workerId='';state.workerClientId='';renderApp()}if(a==='back-worker'){state.workerClientId='';renderApp()}if(a==='clients'){state.screen='clients';renderApp()}if(a==='reports'){state.screen='reports';renderApp()}if(a==='filter-new'){state.statusFilter='חדש';state.screen='clients';renderApp()}if(a==='filter-closed'){state.statusFilter='נסגר / נמכר';state.screen='clients';renderApp()}if(a==='tasks-open'){state.taskFilter='פתוחות';state.screen='tasks';renderApp()}if(a==='download-excel')downloadExcel();if(a==='add-client'){const vals=[$('#new-full').value,$('#new-phone').value,$('#new-city').value,$('#new-email').value,$('#new-product').value];if(!vals[0].trim()||!vals[1].trim())return;const owners=salesWorkers();const owner=activeUser().isManager?owners[state.roundRobinIndex%owners.length].id:state.userId;const c=createClient(vals,owner,0);c.source='הקלדה ידנית';clients=[c,...clients];state.selectedClientId=c.id;state.roundRobinIndex++;state.screen='clients';save();renderApp()}if(a==='load-bulk'){const rows=parseRows($('#bulk-text').value);const owners=salesWorkers();const made=rows.map((r,i)=>createClient(r,activeUser().isManager?owners[(state.roundRobinIndex+i)%owners.length].id:state.userId,i));if(made.length){clients=[...made,...clients];state.selectedClientId=made[0].id;state.roundRobinIndex+=made.length;save();renderApp()}}if(a==='add-worker-task'){const clientId=$('#worker-task-client')?.value||'';const task={id:'T-'+Date.now(),type:$('#worker-task-type').value,status:'פתוחה',ownerId:state.workerId,dueDate:$('#worker-task-date').value||today,note:($('#worker-task-note').value||'').trim()};if(clientId){clients=clients.map(c=>c.id===clientId?{...c,tasks:[task,...(c.tasks||[])],lastAction:'נוספה משימה לעובד: '+task.type}:c)}else{standaloneTasks=[task,...standaloneTasks]}save();renderApp()}if(a==='add-client-worker'){const vals=[$('#worker-new-full').value,$('#worker-new-phone').value,$('#worker-new-city').value,$('#worker-new-email').value,$('#worker-new-product').value];if(!vals[0].trim()||!vals[1].trim())return;const c=createClient(vals,state.workerId,0);clients=[c,...clients];state.workerTab='clients';save();renderApp()}if(a==='load-bulk-worker'){const made=parseRows($('#worker-bulk-text').value).map((r,i)=>createClient(r,state.workerId,i));if(made.length){clients=[...made,...clients];state.workerTab='clients';save();renderApp()}}});const worker=e.target.closest('[data-worker]');if(worker){state.workerId=worker.dataset.worker;state.workerClientId='';state.workerTab=isTaskOnly(state.workerId)?'tasks':'clients';state.workerTaskFilter='הכל';renderApp();return}const tab=e.target.closest('[data-worker-tab]');if(tab){state.workerTab=tab.dataset.workerTab;renderApp();return}const fs=e.target.closest('[data-filter-status]');if(fs){state.statusFilter=fs.dataset.filterStatus;state.screen='clients';renderApp();return}const sc=e.target.closest('[data-select-client]');if(sc){state.selectedClientId=sc.dataset.selectClient;renderApp();return}const oc=e.target.closest('[data-open-client]');if(oc){state.selectedClientId=oc.dataset.openClient;state.workerId='';state.workerClientId='';state.screen='clients';renderApp();return}const ocp=e.target.closest('[data-open-client-panel]');if(ocp){state.selectedClientId=ocp.dataset.openClientPanel;state.workerClientId=ocp.dataset.openClientPanel;renderApp();return}const wh=e.target.closest('[data-whats]');if(wh){openWhats(wh.dataset.whats);return}const sa=e.target.closest('[data-save-action]');if(sa){addAction(sa.dataset.saveAction);return}const sr=e.target.closest('[data-save-report]');if(sr){addReport(sr.dataset.saveReport);return}const addtc=e.target.closest('[data-add-task-client]');if(addtc){const id=addtc.dataset.addTaskClient;const task={id:'T-'+Date.now(),type:$('#task-type').value,status:'פתוחה',ownerId:$('#task-owner').value,dueDate:$('#task-date').value||today,note:($('#task-note').value||'').trim()};clients=clients.map(c=>c.id===id?{...c,tasks:[task,...(c.tasks||[])],lastAction:'נוספה משימה: '+task.type}:c);save();renderApp();return}const ts=e.target.closest('[data-task-status]');if(ts){updateTask(ts.dataset.clientTask,ts.dataset.task,{status:ts.dataset.taskStatus});return}const del=e.target.closest('[data-delete-task]');if(del){deleteTask(del.dataset.clientTask,del.dataset.deleteTask);return}const sd=e.target.closest('[data-save-daily]');if(sd){const wid=sd.dataset.saveDaily,date=$('#daily-date').value||state.salesDate,ex=Number($('#daily-existing').value||0),nw=Number($('#daily-new').value||0),note=($('#daily-note').value||'').trim();const old=salesReports.find(r=>r.workerId===wid&&r.date===date);const next={id:old?.id||'SR-'+Date.now(),workerId:wid,date,existingClientsSales:ex,newClientsSales:nw,note};salesReports=old?salesReports.map(r=>r.id===old.id?next:r):[next,...salesReports];state.salesDate=date;save();renderApp();return}});
  document.addEventListener('change',e=>{const t=e.target;const ch=t.dataset.change;if(ch==='user'){state.userId=t.value;state.screen=t.value==='manager'?'dashboard':'home';state.workerId='';renderApp()}if(ch==='sales-date'){state.salesDate=t.value||today;renderApp()}if(ch==='status-filter'){state.statusFilter=t.value;renderApp()}if(ch==='owner-filter'){state.ownerFilter=t.value;renderApp()}if(ch==='task-filter'){state.taskFilter=t.value;renderApp()}if(ch==='worker-task-filter'){state.workerTaskFilter=t.value;renderApp()}if(t.dataset.clientField){let val=t.value;if(t.dataset.clientField==='saleAmount')val=Number(val||0);const patch={[t.dataset.clientField]:val};if(t.dataset.clientField==='status'){patch.lastAction='סטטוס עודכן ל-'+val;if(val==='נסגר / נמכר')patch.saleDate=today}updateClient(t.dataset.client,patch)}if(t.dataset.taskStatusSelect){updateTask(t.dataset.clientTask,t.dataset.taskStatusSelect,{status:t.value})}});
  document.addEventListener('input',e=>{const t=e.target;if(t.dataset.input==='query'){state.query=t.value;renderApp()}});
  renderApp();
})();
