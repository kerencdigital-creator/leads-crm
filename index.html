<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מערכת ניהול לידים ומכירות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f7fb;
      --panel: rgba(255,255,255,.88);
      --panel-2: rgba(248,250,252,.92);
      --text: #101828;
      --muted: #667085;
      --line: #dbe3ee;
      --dark: #071126;
      --blue: #7fa6ff;
      --blue-2: #cfe0ff;
      --shadow: 0 22px 60px rgba(15,23,42,.09);
      --radius: 28px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Open Sans", Arial, sans-serif; background: radial-gradient(circle at top left, rgba(178,205,255,.55), transparent 30%), var(--bg); color: var(--text); }
    body.dark {
      --bg: #0c1320;
      --panel: rgba(34,38,47,.92);
      --panel-2: rgba(41,46,57,.92);
      --text: #f7f9fc;
      --muted: #b8c0cd;
      --line: rgba(255,255,255,.12);
      --dark: #030817;
      --shadow: 0 24px 80px rgba(0,0,0,.32);
      background: radial-gradient(circle at 18% 8%, rgba(126,166,255,.18), transparent 26%), linear-gradient(135deg, #0f172a 0%, #20242b 48%, #0b1120 100%);
    }
    button, input, textarea, select { font-family: inherit; }
    button { cursor: pointer; }
    .app { min-height: 100vh; display: grid; grid-template-columns: 300px 1fr; gap: 0; }
    aside { background: var(--panel); border-left: 1px solid var(--line); padding: 22px; position: sticky; top: 0; height: 100vh; overflow: auto; backdrop-filter: blur(20px); }
    main { padding: 26px; }
    .wrap { max-width: 1480px; margin: 0 auto; display: grid; gap: 22px; }
    .hero { border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow); padding: 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; border: 1px solid var(--line); }
    .brand { background: var(--dark); color: white; border-radius: 26px; padding: 22px; box-shadow: var(--shadow); }
    .brand small { color: #cbd5e1; }
    .brand h1 { margin: 8px 0 4px; font-size: 26px; line-height: 1.15; }
    .selectbox, input, textarea, select { width: 100%; border: 1px solid var(--line); border-radius: 18px; background: var(--panel); color: var(--text); padding: 12px 14px; font-size: 14px; outline: none; }
    input:focus, textarea:focus, select:focus { border-color: #4d8dff; box-shadow: 0 0 0 3px rgba(77,141,255,.12); }
    textarea { min-height: 100px; resize: vertical; }
    .muted { color: var(--muted); }
    .small { font-size: 12px; }
    .title { margin: 0; font-size: 34px; font-weight: 800; letter-spacing: -.03em; }
    .subtitle { margin: 4px 0 0; color: var(--muted); font-weight: 600; }
    .card { border: 1px solid var(--line); border-radius: var(--radius); background: var(--panel); box-shadow: var(--shadow); padding: 22px; }
    .soft { background: var(--panel-2); box-shadow: none; }
    .grid { display: grid; gap: 16px; }
    .grid2 { grid-template-columns: repeat(2,minmax(0,1fr)); }
    .grid3 { grid-template-columns: repeat(3,minmax(0,1fr)); }
    .grid4 { grid-template-columns: repeat(4,minmax(0,1fr)); }
    .grid5 { grid-template-columns: repeat(5,minmax(0,1fr)); }
    .layout2 { grid-template-columns: 1.1fr .9fr; }
    .layoutWide { grid-template-columns: 1.18fr .82fr; }
    .stats { display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 16px; }
    .stat { border: 1px solid var(--line); background: var(--panel); border-radius: 24px; padding: 18px; text-align: right; box-shadow: var(--shadow); transition: .18s ease; min-height: 112px; }
    .stat:hover, .worker:hover, .rowbtn:hover { transform: translateY(-2px); box-shadow: 0 24px 70px rgba(60,90,140,.14); }
    .stat .num { font-size: 30px; font-weight: 800; margin-top: 8px; }
    .ico { width: 44px; height: 44px; display: inline-flex; align-items: center; justify-content: center; border-radius: 16px; background: rgba(127,166,255,.18); color: var(--text); border: 1px solid rgba(127,166,255,.24); }
    .btn { border: 1px solid var(--line); border-radius: 18px; padding: 11px 18px; background: var(--panel); color: var(--text); font-weight: 700; box-shadow: 0 6px 14px rgba(15,23,42,.05); }
    .btn.primary { background: linear-gradient(135deg, #e8f0ff, #9ebcff); color: #172033; border-color: #b8cbff; }
    .btn.dark { background: var(--dark); color: #fff; border-color: rgba(255,255,255,.08); }
    .btn.danger { background: #ef4444; color: #fff; border-color: #ef4444; }
    .btn.sm { padding: 8px 12px; font-size: 12px; border-radius: 14px; }
    .nav { display: grid; gap: 10px; margin-top: 18px; }
    .nav button { width: 100%; text-align: right; display: flex; align-items: center; gap: 10px; border: 0; background: transparent; color: var(--muted); border-radius: 18px; padding: 13px 14px; font-weight: 800; }
    .nav button.active { background: var(--dark); color: white; box-shadow: var(--shadow); }
    .toggle { display: flex; align-items: center; justify-content: space-between; gap: 12px; border: 1px solid var(--line); border-radius: 20px; padding: 10px 12px; background: var(--panel); font-weight: 800; }
    .switch { width: 58px; height: 30px; border-radius: 99px; border: 1px solid var(--line); background: rgba(148,163,184,.18); position: relative; flex: 0 0 auto; }
    .knob { position: absolute; top: 3px; right: 3px; width: 24px; height: 24px; border-radius: 50%; background: white; box-shadow: 0 4px 12px rgba(0,0,0,.18); transition: .2s; }
    body.dark .knob { right: 29px; background: #dbe7ff; }
    .worker { border: 1px solid var(--line); background: var(--panel-2); border-radius: 24px; padding: 17px; text-align: right; transition: .18s ease; }
    .progress { height: 10px; border-radius: 99px; overflow: hidden; background: rgba(148,163,184,.22); margin-top: 11px; }
    .progress div { height: 100%; border-radius: 99px; background: linear-gradient(90deg,#5f8fff,#bed0ff); }
    .status { display: inline-flex; border-radius: 999px; padding: 6px 10px; border: 1px solid var(--line); font-size: 12px; font-weight: 800; background: rgba(127,166,255,.12); color: var(--text); }
    .tablewrap { overflow: auto; border: 1px solid var(--line); border-radius: 24px; background: var(--panel); }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { border-bottom: 1px solid var(--line); padding: 12px; text-align: right; vertical-align: middle; }
    th { color: var(--muted); font-size: 13px; background: rgba(148,163,184,.08); }
    .actions { display: flex; flex-wrap: wrap; gap: 9px; align-items: center; }
    .modalCover { position: fixed; inset: 0; z-index: 50; background: rgba(2,6,23,.58); display: flex; align-items: center; justify-content: center; padding: 18px; }
    .modal { width: min(1240px, 100%); max-height: 92vh; overflow: auto; background: var(--panel); border: 1px solid var(--line); border-radius: 34px; box-shadow: 0 30px 100px rgba(0,0,0,.32); padding: 24px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 10px; }
    .timeline { max-height: 330px; overflow: auto; display: grid; gap: 10px; padding: 10px; border-radius: 22px; background: var(--panel-2); }
    .lineitem { border-radius: 18px; padding: 12px; background: var(--panel); border: 1px solid var(--line); }
    .empty { border: 1px dashed var(--line); border-radius: 24px; padding: 34px; text-align: center; color: var(--muted); background: var(--panel); }
    .topActions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    @media (max-width: 1100px) { .app { grid-template-columns: 1fr; } aside { position: relative; height: auto; } .stats, .grid5, .grid4, .grid3, .grid2, .layout2, .layoutWide { grid-template-columns: 1fr; } main { padding: 16px; } .hero { flex-direction: column; align-items: stretch; } }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const SOURCE = "טופס - דר אירית שחם";
    const today = new Date().toISOString().slice(0, 10);
    const clientStatuses = ["חדש", "בטיפול", "לא ענה", "לחזור אליו", "שיחה נקבעה", "נסגר / נמכר", "לא רלוונטי"];
    const clientTaskTypes = ["לתת הצעת מחיר", "לקבוע פגישה אחד על אחד", "להזמין להדרכה"];
    const employeeTaskTypes = ["משימה כללית", "משימת גרפיקה", "משימת שיווק", "משימת תוכן", "משימת אתר", "משימת גביה", "משימת לוגיסטיקה", "אחר"];
    const taskStatuses = ["פתוחה", "משימה בטיפול", "משימה הושלמה"];
    const taskOnlyWorkerIds = ["w-0", "w-6", "w-7", "w-8"];
    const workers = [
      { id: "manager", name: "מנהל/ת לידים", role: "מנהל לידים", isManager: true },
      { id: "w-0", name: "שגיא", role: "גרפיקה", taskOnly: true },
      { id: "w-1", name: "לואיזה", role: "מכירות" },
      { id: "w-2", name: "דניאל", role: "מכירות" },
      { id: "w-3", name: "ליהי", role: "מכירות" },
      { id: "w-4", name: "נלי", role: "מדריכה ומכירות" },
      { id: "w-5", name: "אורית", role: "מנהלת משרד ומכירות" },
      { id: "w-6", name: "שילי", role: "מנהלת שיווק", taskOnly: true },
      { id: "w-7", name: "שני", role: "יוצרת תוכן", taskOnly: true },
      { id: "w-8", name: "קרן", role: "אתרים", taskOnly: true },
      { id: "w-9", name: "חוה", role: "לוגיסטיקה" },
      { id: "w-10", name: "גיירן", role: "גביה" }
    ];
    const demoClients = [
      client("C-1001", "לירון כהן", "054-2095258", "w-1", "חדש", 0, "לקבוע פגישה אחד על אחד"),
      client("C-1002", "ורד מויאל", "050-3822203", "w-2", "חדש", 0, "לתת הצעת מחיר"),
      client("C-1003", "לימור מלא בן הרוש", "050-9447890", "w-3", "חדש", 0, ""),
      client("C-1004", "גילת לוין", "050-7450967", "w-4", "חדש", 0, ""),
      client("C-1005", "איילה כהן", "050-6286609", "w-5", "נסגר / נמכר", 3200, "לקבוע פגישה אחד על אחד"),
      client("C-1006", "מיכל בידאני", "052-6958897", "w-1", "חדש", 0, ""),
      client("C-1007", "מיכל מלכה", "054-9987799", "w-2", "חדש", 0, "")
    ];
    const demoTasks = [
      { id: "ET-1", type: "להכין גרפיקה לקמפיין", status: "פתוחה", ownerId: "w-0", dueDate: today, note: "משימה פנימית ללא לקוח מקושר" },
      { id: "ET-2", type: "בדיקת חומר שיווקי", status: "משימה בטיפול", ownerId: "w-6", dueDate: today, note: "משימה פנימית לשיווק" },
      { id: "ET-3", type: "עדכון תוכן", status: "פתוחה", ownerId: "w-7", dueDate: today, note: "משימה פנימית לתוכן" },
      { id: "ET-4", type: "עדכון אתר", status: "פתוחה", ownerId: "w-8", dueDate: today, note: "משימה פנימית לאתרים" }
    ];
    function client(id, fullName, phone, ownerId, status, saleAmount, taskType) {
      return {
        id, fullName, phone, email: "", city: "רמת השרון", source: SOURCE, product: "טיפולי מרקם עור - פילינגים",
        status, ownerId, createdAt: today, followUpAt: today, saleAmount, saleDate: saleAmount ? today : "", lastAction: saleAmount ? "נסגרה עסקה" : "ליד חדש מהטופס",
        actions: [{ id: "A-" + id, userId: ownerId, type: saleAmount ? "מכירה" : "קליטת ליד", text: saleAmount ? "סגירת עסקה לאחר שיחה" : "התקבל ליד חדש מהטופס", date: today }],
        reports: saleAmount ? [{ id: "R-" + id, userId: ownerId, text: "הלקוחה אישרה טיפול ראשון. נקבעה פגישה.", date: today }] : [],
        tasks: taskType ? [{ id: "CT-" + id, type: taskType, status: saleAmount ? "משימה הושלמה" : "פתוחה", ownerId, dueDate: today, note: saleAmount ? "הושלם" : "לטיפול" }] : []
      };
    }
    const state = {
      screen: "dashboard", activeUserId: "manager", dark: JSON.parse(localStorage.getItem("crm-dark") || "false"),
      salesDate: today, clients: load("crm-clients", demoClients), standaloneTasks: load("crm-tasks", demoTasks), selectedClientId: "C-1001",
      query: "", statusFilter: "הכל", ownerFilter: "הכל", taskFilter: "הכל", nextWorkerIndex: 1,
      workerModal: { workerId: "", tab: "clients", clientId: "", taskFilter: "הכל" }
    };
    function load(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) || fallback; } catch { return fallback; } }
    function save() { localStorage.setItem("crm-clients", JSON.stringify(state.clients)); localStorage.setItem("crm-tasks", JSON.stringify(state.standaloneTasks)); localStorage.setItem("crm-dark", JSON.stringify(state.dark)); }
    function h(v) { return String(v ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m])); }
    function fmt(d) { return d ? new Date(d + "T00:00:00").toLocaleDateString("he-IL") : "—"; }
    function isTaskOnly(id) { return taskOnlyWorkerIds.includes(id); }
    function clientWorkers() { return workers.filter(w => !w.isManager && !isTaskOnly(w.id)); }
    function workerName(id) { return (workers.find(w => w.id === id) || {}).name || "לא משויך"; }
    function activeUser() { return workers.find(w => w.id === state.activeUserId) || workers[0]; }
    function isManager() { return !!activeUser().isManager; }
    function visibleClients() { if (!isManager() && isTaskOnly(state.activeUserId)) return []; return isManager() ? state.clients : state.clients.filter(c => c.ownerId === state.activeUserId); }
    function flatTasks() { return state.clients.flatMap(c => c.tasks.map(t => ({...t, clientId: c.id, clientName: c.fullName}))).concat(state.standaloneTasks.map(t => ({...t, clientId: "", clientName: "ללא לקוח מקושר"}))); }
    function matchTask(t, f) { if (f === "הכל") return true; if (f === "פתוחות") return t.status !== "משימה הושלמה"; return t.status === f; }
    function visibleTasks() { const base = isManager() ? flatTasks() : flatTasks().filter(t => t.ownerId === state.activeUserId); return base.filter(t => matchTask(t, state.taskFilter)); }
    function visibleReports() { const reports = state.clients.flatMap(c => c.reports.map(r => ({...r, clientId: c.id, clientName: c.fullName}))); return isManager() ? reports : reports.filter(r => r.userId === state.activeUserId); }
    function metrics() { const vc = visibleClients(); const closed = c => c.status === "נסגר / נמכר"; const saleDate = c => c.saleDate || c.createdAt; const vt = visibleTasks(); return {
      salesToday: vc.filter(c => closed(c) && saleDate(c) === today).reduce((s,c)=>s+Number(c.saleAmount||0),0),
      salesByDate: vc.filter(c => closed(c) && saleDate(c) === state.salesDate).reduce((s,c)=>s+Number(c.saleAmount||0),0),
      closedByDate: vc.filter(c => closed(c) && saleDate(c) === state.salesDate).length,
      clients: vc.length, openTasks: vt.filter(t => t.status !== "משימה הושלמה").length, doneTasks: vt.filter(t => t.status === "משימה הושלמה").length, reports: visibleReports().length
    }; }
    function workerStats() { return workers.filter(w => !w.isManager).map(w => { const cs = isTaskOnly(w.id) ? [] : state.clients.filter(c => c.ownerId === w.id); const ts = flatTasks().filter(t => t.ownerId === w.id); const reports = state.clients.flatMap(c=>c.reports).filter(r=>r.userId===w.id); return {
      ...w, clients: cs.length, revenue: cs.filter(c=>c.status==="נסגר / נמכר").reduce((s,c)=>s+Number(c.saleAmount||0),0),
      salesToday: cs.filter(c=>c.status==="נסגר / נמכר" && (c.saleDate||c.createdAt)===today).reduce((s,c)=>s+Number(c.saleAmount||0),0),
      salesByDate: cs.filter(c=>c.status==="נסגר / נמכר" && (c.saleDate||c.createdAt)===state.salesDate).reduce((s,c)=>s+Number(c.saleAmount||0),0),
      openTasks: ts.filter(t=>t.status!=="משימה הושלמה").length, inProgress: ts.filter(t=>t.status==="משימה בטיפול").length, done: ts.filter(t=>t.status==="משימה הושלמה").length, reports: reports.length
    }; }); }
    function filteredClients() { const q = state.query.trim().toLowerCase(); return visibleClients().filter(c => (!q || [c.fullName,c.phone,c.email,c.city,c.product].some(x=>String(x).toLowerCase().includes(q))) && (state.statusFilter === "הכל" || c.status === state.statusFilter) && (!isManager() || state.ownerFilter === "הכל" || c.ownerId === state.ownerFilter)); }
    function selectedClient() { return state.clients.find(c => c.id === state.selectedClientId) || visibleClients()[0] || state.clients[0]; }

    function stat(icon, title, value, subtitle, action) { return `<button class="stat" onclick="${action || ''}"><div class="ico">${icon}</div><div class="muted small">${h(title)}</div><div class="num">${h(value)}</div>${subtitle ? `<div class="muted small">${h(subtitle)}</div>` : ""}</button>`; }
    function nav(id, icon, label) { return `<button class="${state.screen===id?'active':''}" onclick="setScreen('${id}')"><span>${icon}</span>${h(label)}</button>`; }
    function options(values, selected, valueField, labelField) { return values.map(v => { const val = valueField ? v[valueField] : v; const lab = labelField ? v[labelField] : v; return `<option value="${h(val)}" ${String(val)===String(selected)?'selected':''}>${h(lab)}</option>`; }).join(""); }
    function statusPill(s) { return `<span class="status">${h(s)}</span>`; }
    function top() { const u = activeUser(); return `<header class="hero"><div><div class="subtitle">משתמש פעיל: ${h(u.name)} · ${h(u.role)}</div><h2 class="title">${screenTitle()}</h2></div><div class="topActions">${themeToggle()}${!isTaskOnly(state.activeUserId)?`<button class="btn primary" onclick="setScreen('clients')">+ הוספת לקוח</button>`:""}</div></header>`; }
    function themeToggle() { return `<button class="toggle" onclick="toggleDark()"><span><b>Light / Dark</b><br><small class="muted">${state.dark?'Dark פעיל':'Light פעיל'}</small></span><span class="switch"><span class="knob"></span></span></button>`; }
    function screenTitle() { return ({dashboard:"דשבורד מנהלים", home:"מסך בית", clients:"טבלת לקוחות", tasks:"משימות", reports:"דוחות ודיווחים", manager:"מנהל לידים"})[state.screen] || "מערכת"; }
    function render() { document.body.classList.toggle("dark", state.dark); document.getElementById("app").innerHTML = `<div class="app"><aside>${sidebar()}</aside><main><div class="wrap">${top()}${screen()}${workerModal()}</div></main></div>`; }
    function sidebar() { const u = activeUser(); return `<div class="brand"><small>CRM עובדים</small><h1>ניהול לקוחות ומכירות</h1><small>משתמש אישי + מנהל לידים</small></div><div class="card soft" style="margin-top:16px;padding:14px;">${themeToggle()}<label class="small muted" style="display:block;margin-top:14px;">כניסה כמשתמש</label><select onchange="setUser(this.value)">${workers.map(w=>`<option value="${w.id}" ${w.id===state.activeUserId?'selected':''}>${h(w.name)} · ${h(w.role)}</option>`).join("")}</select></div><nav class="nav">${isManager()?nav('dashboard','▥','דשבורד מנהלים'):''}${nav('home','⌂','מסך בית')}${!isTaskOnly(state.activeUserId)?nav('clients','▤','טבלת לקוחות'):''}${nav('tasks','✓','משימות')}${nav('reports','↯','דוחות ודיווחים')}${isManager()?nav('manager','♧','מנהל לידים'):''}</nav>`; }
    function screen() { if (state.screen === "dashboard") return dashboard(); if (state.screen === "home") return home(); if (state.screen === "clients") return clientsScreen(); if (state.screen === "tasks") return tasksScreen(); if (state.screen === "reports") return reportsScreen(); if (state.screen === "manager") return managerScreen(); return ""; }
    function dashboard() { const m=metrics(); const stats=workerStats(); const statusRows = clientStatuses.map(s=>{ const n=visibleClients().filter(c=>c.status===s).length; const w=visibleClients().length?Math.max(6,Math.round(n/visibleClients().length*100)):6; return `<button class="rowbtn worker" onclick="setClientStatusFilter('${s}')"><b>${h(s)}</b><span style="float:left">${n}</span><div class="progress"><div style="width:${w}%"></div></div></button>`; }).join(""); return `<div class="card"><div class="grid grid2"><div><h3>פילטור סך המכירות לפי תאריך</h3><p class="muted">מציג את סך המכירות והסגירות בתאריך שנבחר.</p></div><div><input type="date" value="${state.salesDate}" onchange="setSalesDate(this.value)"><p class="muted"><b>₪${m.salesByDate.toLocaleString('he-IL')}</b> · ${m.closedByDate} סגירות</p></div></div></div><section class="stats">${stat('◎','לידים שנכנסו היום', visibleClients().filter(c=>c.createdAt===today).length, 'לחיצה תציג לידים חדשים', "setClientStatusFilter('חדש')")}${stat('✓','סגירות', visibleClients().filter(c=>c.status==='נסגר / נמכר').length, 'אחוז המרה כללי', "setClientStatusFilter('נסגר / נמכר')")}${stat('⏰','תזכורות פתוחות', visibleClients().filter(c=>c.followUpAt && c.status!=='נסגר / נמכר').length, 'Follow-up פתוח', "setScreen('clients')")}${stat('✓','משימות עובדים פתוחות', flatTasks().filter(t=>t.status!== 'משימה הושלמה').length, `${flatTasks().filter(t=>t.status==='משימה הושלמה').length} הושלמו`, "openTasks('פתוחות')")}${stat('₪','סך מכירות בתאריך', '₪'+m.salesByDate.toLocaleString('he-IL'), fmt(state.salesDate), "setScreen('reports')")}</section><div class="grid layoutWide"><div class="card"><h3>ביצועים לפי עובד</h3><p class="muted">לחיצה על עובד תפתח את תיקי הלקוחות והמשימות שלו.</p><div class="grid grid2">${stats.map(workerCard).join("")}</div></div><div class="card"><h3>מצב לידים כללי</h3><p class="muted">כל סטטוס לחיץ ומוביל לרשימת הלקוחות הרלוונטיים.</p><div class="grid">${statusRows}</div><div class="grid grid3" style="margin-top:16px;">${stat('▤','לידים פתוחים', visibleClients().filter(c=>!["נסגר / נמכר","לא רלוונטי"].includes(c.status)).length, '', "setScreen('clients')")}${stat('✓','משימות פתוחות', flatTasks().filter(t=>t.status!=='משימה הושלמה').length, '', "openTasks('פתוחות')")}${stat('★','עובד בולט', (stats.sort((a,b)=>b.revenue-a.revenue)[0]||{}).name||'—', '', "openBestWorker()")}</div></div></div>`; }
    function workerCard(w) { const width = Math.min(100, Math.max(8, w.clients*12 + w.done*8)); return `<button class="worker" onclick="openWorker('${w.id}','clients')"><div style="display:flex;justify-content:space-between;gap:10px"><div><b>${h(w.name)}</b><div class="muted small">${h(w.role)}${w.taskOnly?' · משימות בלבד':''}</div></div><b>₪${w.revenue.toLocaleString('he-IL')}</b></div><p class="muted small">${w.clients} לידים · ${w.openTasks} משימות פתוחות · ${w.inProgress} בטיפול · ${w.done} הושלמו</p><div class="progress"><div style="width:${width}%"></div></div></button>`; }
    function home() { const m=metrics(); return `<div class="card"><div class="grid grid2"><div><h3>סיכום מכירות אישי</h3><p class="muted">מכירות היום ופילטור לפי תאריך.</p></div><div><input type="date" value="${state.salesDate}" onchange="setSalesDate(this.value)"><p class="muted">מכירות בתאריך: <b>₪${m.salesByDate.toLocaleString('he-IL')}</b></p></div></div></div><section class="stats">${stat('₪','סך מכירות היום','₪'+m.salesToday.toLocaleString('he-IL'), isManager()?'כל העובדים':'הנתונים שלי', "setScreen('reports')")}${stat('₪','מכירות לפי תאריך','₪'+m.salesByDate.toLocaleString('he-IL'), fmt(state.salesDate), "setScreen('reports')")}${!isTaskOnly(state.activeUserId)?stat('▤','לקוחות בטיפול',m.clients,'תיקי לקוחות נגישים',"setScreen('clients')"):''}${stat('✓','משימות עובדים פתוחות',m.openTasks,`${m.doneTasks} הושלמו`,"openTasks('פתוחות')")}${stat('✉','דיווחים',m.reports,'פעולות ודיווחי משתמשים',"setScreen('reports')")}</section>${!isTaskOnly(state.activeUserId)?recentClients():''}`; }
    function recentClients() { return `<div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div><h3>לקוחות אחרונים</h3><p class="muted">לחיצה על לקוח פותחת את תיק הלקוח המלא.</p></div><button class="btn" onclick="setScreen('clients')">פתיחת טבלה</button></div><div class="grid grid3">${visibleClients().slice(0,6).map(c=>`<button class="worker" onclick="openClient('${c.id}')"><b>${h(c.fullName)}</b> ${statusPill(c.status)}<p class="muted small">${h(c.phone)} · ${h(c.product)}</p><p class="muted small">מטפל: ${workerName(c.ownerId)}</p></button>`).join("")}</div></div>`; }
    function clientsScreen() { return `<div class="grid layout2"><section class="grid"><div class="card"><h3>הוספת לקוח / טעינת טבלה</h3><div class="grid grid2"><input id="newName" placeholder="שם מלא"><input id="newPhone" placeholder="טלפון"><input id="newEmail" placeholder="אימייל"><input id="newCity" placeholder="עיר / אזור"><input id="newProduct" placeholder="מוצר / שירות"></div><button class="btn dark" style="margin-top:12px" onclick="addClient()">+ הוספת לקוח</button><div class="card soft" style="margin-top:16px"><h4>טעינת לקוחות בהדבקה מטבלה</h4><p class="muted small">כל שורה: שם, טלפון, עיר, אימייל, מוצר.</p><textarea id="bulkText" placeholder="ישראל ישראלי,0500000000,תל אביב,email@test.com,ייעוץ"></textarea><button class="btn" onclick="loadBulkClients()">טעינת לקוחות</button></div></div>${clientsTable(filteredClients(), true)}</section><section>${clientPanel(selectedClient(), false)}</section></div>`; }
    function clientsTable(list, global) { return `<div class="card"><div class="grid grid3" style="margin-bottom:14px"><input placeholder="חיפוש לפי שם, טלפון או עיר" value="${h(state.query)}" oninput="state.query=this.value;render()"><select onchange="state.statusFilter=this.value;render()"><option>הכל</option>${options(clientStatuses,state.statusFilter)}</select><select ${!isManager()?'disabled':''} onchange="state.ownerFilter=this.value;render()"><option value="הכל">כל העובדים</option>${clientWorkers().map(w=>`<option value="${w.id}" ${state.ownerFilter===w.id?'selected':''}>${h(w.name)}</option>`).join("")}</select></div><div class="tablewrap"><table><thead><tr><th>שם</th><th>טלפון</th><th>עיר</th><th>מוצר</th><th>סטטוס</th><th>עובד</th><th>מכירה</th><th>פתיחה</th></tr></thead><tbody>${list.map(c=>`<tr><td><input value="${h(c.fullName)}" onchange="updateClient('${c.id}','fullName',this.value)"></td><td><input value="${h(c.phone)}" onchange="updateClient('${c.id}','phone',this.value)"></td><td><input value="${h(c.city)}" onchange="updateClient('${c.id}','city',this.value)"></td><td><input value="${h(c.product)}" onchange="updateClient('${c.id}','product',this.value)"></td><td><select onchange="updateStatus('${c.id}',this.value)">${options(clientStatuses,c.status)}</select></td><td><select ${!isManager()?'disabled':''} onchange="updateClient('${c.id}','ownerId',this.value)">${clientWorkers().map(w=>`<option value="${w.id}" ${w.id===c.ownerId?'selected':''}>${h(w.name)}</option>`).join("")}</select></td><td><input type="number" value="${Number(c.saleAmount||0)}" onchange="updateClient('${c.id}','saleAmount',Number(this.value))"></td><td><button class="btn dark" onclick="${global?`openClient('${c.id}')`:`openClientInWorker('${c.id}')`}">תיק לקוח</button></td></tr>`).join("")}</tbody></table></div></div>`; }
    function clientPanel(c, inModal) { if (!c) return `<div class="empty">בחרי לקוח</div>`; return `<div class="card"><div style="display:flex;justify-content:space-between;gap:12px"><div><h3>${h(c.fullName)}</h3><p class="muted">${h(c.phone)} · ${h(c.email||'ללא אימייל')}</p></div>${statusPill(c.status)}</div><div class="grid grid2 card soft"><div>מוצר: <b>${h(c.product)}</b></div><div>עיר: <b>${h(c.city)}</b></div><div>עובד מטפל: <b>${workerName(c.ownerId)}</b></div><div>מכירה: <b>₪${Number(c.saleAmount||0).toLocaleString('he-IL')}</b></div></div><div class="actions card soft"><button class="btn dark" onclick="sendWhatsApp('${c.id}')">פתיחת WhatsApp</button>${inModal?`<button class="btn" onclick="backToWorker()">חזרה לכרטיס עובד</button>`:''}<span class="muted small">פותח WhatsApp בלבד, ללא הודעה מוכנה.</span></div><div class="grid grid2"><div><h4>הוספת פעולה / סיכום שיחה</h4><textarea id="actionText" placeholder="מה קרה בשיחה? מה סוכם? האם צריך המשך טיפול?"></textarea><button class="btn" onclick="addAction('${c.id}')">שמירת פעולה בהיסטוריה</button><h4>Timeline פעולות</h4><div class="timeline">${c.actions.map(a=>`<div class="lineitem"><b>${h(a.type)} · ${workerName(a.userId)}</b><p>${h(a.text)}</p><small class="muted">${fmt(a.date)}</small></div>`).join("") || '<p class="muted">אין פעולות עדיין.</p>'}</div></div><div><h4>משימות על הלקוח</h4>${taskEditor(c)}<h4>דיווח פנימי</h4><textarea id="reportText" placeholder="דיווח פנימי למנהל/ת על מה בוצע מול הלקוח"></textarea><button class="btn" onclick="addReport('${c.id}')">שמירת דיווח</button><div class="timeline">${c.reports.map(r=>`<div class="lineitem"><b>${workerName(r.userId)} · ${fmt(r.date)}</b><p>${h(r.text)}</p></div>`).join("") || '<p class="muted">אין דיווחים עדיין.</p>'}</div></div></div></div>`; }
    function taskEditor(c) { return `<div class="grid"><select id="clientTaskType">${options(clientTaskTypes,clientTaskTypes[0])}</select><select id="clientTaskOwner">${workers.filter(w=>!w.isManager).map(w=>`<option value="${w.id}" ${w.id===c.ownerId?'selected':''}>${h(w.name)} · ${h(w.role)}${w.taskOnly?' · משימות בלבד':''}</option>`).join("")}</select><input type="date" id="clientTaskDate" value="${today}"><input id="clientTaskNote" placeholder="הערה למשימה"><button class="btn" onclick="addClientTask('${c.id}')">הוספת משימה לעובד</button></div><div class="grid" style="margin-top:12px">${c.tasks.map(t=>`<div class="lineitem"><b>${h(t.type)}</b> ${statusPill(t.status)}<p class="muted small">אחראי: ${workerName(t.ownerId)} · יעד: ${fmt(t.dueDate)}</p><p>${h(t.note)}</p><div class="actions">${taskStatuses.map(s=>`<button class="btn sm" onclick="updateTask('${c.id}','${t.id}','${s}')">${h(s)}</button>`).join("")}<button class="btn sm danger" onclick="removeTask('${c.id}','${t.id}')">מחיקה</button></div></div>`).join("") || '<p class="muted">אין משימות עובדים שמקושרות ללקוח הזה.</p>'}</div>`; }
    function tasksScreen() { const filters = ["הכל","פתוחות","פתוחה","משימה בטיפול","משימה הושלמה"]; return `<div class="card"><div style="display:flex;justify-content:space-between;gap:10px;align-items:center"><div><h3>משימות עובדים</h3><p class="muted">${isManager()?"מנהל הלידים רואה את משימות העובדים של כולם.":"כאן מופיעות משימות העובד שלך בלבד."}</p></div>${!isTaskOnly(state.activeUserId)?'<button class="btn" onclick="setScreen(\'clients\')">פתיחת טבלת לקוחות</button>':''}</div><div class="actions" style="margin:14px 0">${filters.map(f=>`<button class="btn sm ${state.taskFilter===f?'dark':''}" onclick="openTasks('${f}')">${h(f)}</button>`).join("")}</div><div class="grid">${visibleTasks().map(taskRow).join("") || '<div class="empty">אין משימות</div>'}</div></div>`; }
    function taskRow(t) { return `<div class="worker"><div style="display:flex;justify-content:space-between;gap:12px"><div><b>${h(t.clientName)}</b> ${statusPill(t.status)}<p>${h(t.type)}</p><p class="muted small">אחראי: ${workerName(t.ownerId)} · יעד: ${fmt(t.dueDate)}</p><p>${h(t.note||'')}</p></div><div class="grid" style="min-width:170px"><select onchange="updateTask('${t.clientId}','${t.id}',this.value)">${options(taskStatuses,t.status)}</select>${t.clientId?`<button class="btn" onclick="openClient('${t.clientId}')">תיק לקוח</button>`:'<span class="status">ללא תיק לקוח</span>'}</div></div></div>`; }
    function reportsScreen() { const m=metrics(); return `<div class="grid"><div class="card"><div class="grid grid2"><div><h3>פילטור דוח מכירות לפי תאריך</h3><p class="muted">הדוח והמדדים מתעדכנים לפי התאריך שנבחר.</p></div><div><input type="date" value="${state.salesDate}" onchange="setSalesDate(this.value)"><p class="muted"><b>₪${m.salesByDate.toLocaleString('he-IL')}</b> · ${m.closedByDate} סגירות</p></div></div></div><section class="stats">${stat('₪','מכירות היום','₪'+m.salesToday.toLocaleString('he-IL'))}${stat('₪','מכירות בתאריך','₪'+m.salesByDate.toLocaleString('he-IL'),fmt(state.salesDate))}${stat('▤','תיקי לקוחות',m.clients)}${stat('✓','משימות עובדים פתוחות',m.openTasks,'',"openTasks('פתוחות')")}${stat('✉','דיווחים',m.reports)}</section><div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><h3>דוחות ודיווחים על המסך</h3><p class="muted">כולל לקוחות, משימות ודיווחי משתמשים.</p></div><button class="btn dark" onclick="downloadExcel()">הורדה לאקסל</button></div><div class="grid grid2"><div><h4>דיווחים אחרונים</h4>${visibleReports().map(r=>`<button class="worker" onclick="openClient('${r.clientId}')"><b>${h(r.clientName)} · ${workerName(r.userId)}</b><p>${h(r.text)}</p><small class="muted">${fmt(r.date)}</small></button>`).join("")||'<p class="muted">אין דיווחים להצגה.</p>'}</div><div><h4>דוח עובדים</h4>${workerStats().map(w=>`<div class="worker"><b>${h(w.name)}</b><p class="muted small">${w.clients} לקוחות · ${w.openTasks} משימות פתוחות · ${w.reports} דיווחים</p><b>₪${w.salesToday.toLocaleString('he-IL')}</b></div>`).join("")}</div></div></div></div>`; }
    function managerScreen() { const m=metrics(); return `<div class="grid"><div class="card"><div class="grid grid2"><div><h3>פילטור מכירות מנהל לפי תאריך</h3><p class="muted">מנהל הלידים רואה את המכירות של כולם לפי תאריך.</p></div><div><input type="date" value="${state.salesDate}" onchange="setSalesDate(this.value)"><p class="muted"><b>₪${m.salesByDate.toLocaleString('he-IL')}</b> · ${m.closedByDate} סגירות</p></div></div></div><section class="stats">${stat('₪','מכירות היום - כולם','₪'+m.salesToday.toLocaleString('he-IL'))}${stat('₪','מכירות בתאריך - כולם','₪'+m.salesByDate.toLocaleString('he-IL'),fmt(state.salesDate))}${stat('▤','תיקי לקוחות - כולם',state.clients.length)}${stat('✓','משימות פתוחות - כולם',flatTasks().filter(t=>t.status!=='משימה הושלמה').length,'',"openTasks('פתוחות')")}${stat('✉','דיווחים - כולם',state.clients.flatMap(c=>c.reports).length)}</section><div class="card"><h3>שליטת מנהל לידים · משימות עובדים</h3><div class="grid grid3">${workerStats().map(w=>`<button class="worker" onclick="openWorker('${w.id}','clients')"><b>${h(w.name)}</b><p class="muted small">${h(w.role)}</p><p>לקוחות: <b>${w.clients}</b></p><p>משימות פתוחות: <b>${w.openTasks}</b></p><p>הושלמו: <b>${w.done}</b></p><p>מכירות היום: <b>₪${w.salesToday.toLocaleString('he-IL')}</b></p></button>`).join("")}</div></div></div>`; }
    function workerModal() { const w = workers.find(x=>x.id===state.workerModal.workerId); if (!w) return ""; const taskOnly = isTaskOnly(w.id); const wClients = taskOnly ? [] : state.clients.filter(c=>c.ownerId===w.id); const wTasks = flatTasks().filter(t=>t.ownerId===w.id); const shownTasks = wTasks.filter(t=>matchTask(t,state.workerModal.taskFilter)); const st = workerStats().find(x=>x.id===w.id) || {}; const c = state.workerModal.clientId ? state.clients.find(x=>x.id===state.workerModal.clientId) : null; return `<div class="modalCover" onclick="closeWorker()"><div class="modal" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;gap:14px;align-items:start;margin-bottom:18px"><div><h2>${c?h(c.fullName):h(w.name)}</h2><p class="muted">${c?`תיק לקוח מתוך כרטיס העובד · ${h(w.name)}`:`${h(w.role)} · ${taskOnly?'משימות בלבד':wClients.length+' לקוחות'} · ${wTasks.length} משימות עובדים`}</p></div><div class="tabs">${c?`<button class="btn dark" onclick="backToWorker()">חזרה לעובד</button>`:""}${!c&&!taskOnly?`<button class="btn ${state.workerModal.tab==='clients'?'dark':''}" onclick="setWorkerTab('clients')">לידים של העובד</button>`:""}${!c?`<button class="btn ${state.workerModal.tab==='tasks'?'dark':''}" onclick="setWorkerTab('tasks')">משימות של העובד</button>`:""}${!c&&!taskOnly?`<button class="btn ${state.workerModal.tab==='load'?'dark':''}" onclick="setWorkerTab('load')">טעינת טבלת לקוחות</button>`:""}<button class="btn" onclick="closeWorker()">סגירה</button></div></div>${c?clientPanel(c,true):workerModalContent(w, taskOnly, wClients, shownTasks, st)}</div></div>`; }
    function workerModalContent(w, taskOnly, wClients, shownTasks, st) { return `<div class="grid"><section class="stats">${!taskOnly?stat('▤','לידים',wClients.length,'לקוחות משויכים לעובד',"setWorkerTab('clients')"):''}${stat('✓','משימות פתוחות',st.openTasks||0,'לחיצה תציג פתוחות',"setWorkerTaskFilter('פתוחות')")}${stat('✓','הושלמו',st.done||0,'לחיצה תציג הושלמו',"setWorkerTaskFilter('משימה הושלמה')")}${!taskOnly?stat('₪','מכירות בתאריך','₪'+Number(st.salesByDate||0).toLocaleString('he-IL'),fmt(state.salesDate),"setWorkerTab('clients')"):''}</section>${state.workerModal.tab==='clients'&&!taskOnly?workerClientsTab(wClients,w):''}${state.workerModal.tab==='tasks'?workerTasksTab(w, taskOnly, wClients, shownTasks):''}${state.workerModal.tab==='load'&&!taskOnly?workerLoadTab(w):''}</div>`; }
    function workerClientsTab(list, w) { return `<div class="grid layout2">${clientsTable(list,false)}<div class="card"><h3>הוספת לקוח לעובד</h3><input id="wn" placeholder="שם מלא"><input id="wp" placeholder="טלפון"><input id="wc" placeholder="עיר"><input id="we" placeholder="אימייל"><input id="wprod" placeholder="מוצר / שירות"><button class="btn dark" onclick="addClientToWorker('${w.id}')">הוספת לקוח לעובד</button></div></div>`; }
    function workerTasksTab(w, taskOnly, wClients, tasks) { const taskTypes = taskOnly ? employeeTaskTypes : clientTaskTypes; const filters=["הכל","פתוחות","פתוחה","משימה בטיפול","משימה הושלמה"]; return `<div class="grid layout2"><div class="card"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div><h3>משימות של ${h(w.name)}</h3><p class="muted">כל כפתור סינון מציג את המשימות הרלוונטיות בלבד.</p></div><div class="actions">${filters.map(f=>`<button class="btn sm ${state.workerModal.taskFilter===f?'dark':''}" onclick="setWorkerTaskFilter('${f}')">${h(f)}</button>`).join("")}</div></div><div class="grid">${tasks.map(taskRowInWorker).join("") || '<div class="empty">אין משימות להצגה</div>'}</div></div><div class="card"><h3>${taskOnly?'הוספת משימה רגילה לעובד':'הוספת משימה לעובד'}</h3><p class="muted">${taskOnly?'לעובד זה אין לקוחות. המשימות כאן הן משימות פנימיות רגילות בלבד.':'אפשר לקשר משימה ללקוח, או להשאיר ללא לקוח מקושר.'}</p>${!taskOnly?`<select id="wtClient"><option value="">ללא לקוח מקושר</option>${wClients.map(c=>`<option value="${c.id}">${h(c.fullName)}</option>`).join("")}</select>`:""}<select id="wtType">${options(taskTypes,taskTypes[0])}</select><input id="wtDate" type="date" value="${today}"><input id="wtNote" placeholder="הערה למשימה"><button class="btn dark" onclick="addWorkerTask('${w.id}')">הוספת משימה</button></div></div>`; }
    function taskRowInWorker(t) { return `<div class="worker"><div style="display:flex;justify-content:space-between;gap:12px"><div><b>${h(t.clientId?t.clientName:'משימה פנימית')}</b><p>${h(t.type)}</p><p class="muted small">יעד: ${fmt(t.dueDate)}</p><p>${h(t.note||'')}</p></div><div class="grid" style="min-width:170px"><select onchange="updateTask('${t.clientId}','${t.id}',this.value)">${options(taskStatuses,t.status)}</select>${t.clientId?`<button class="btn dark" onclick="openClientInWorker('${t.clientId}')">תיק לקוח</button>`:'<span class="status">ללא תיק לקוח</span>'}</div></div></div>`; }
    function workerLoadTab(w) { return `<div class="card"><h3>טעינת טבלת לקוחות עבור ${h(w.name)}</h3><p class="muted">כל שורה: שם, טלפון, עיר, אימייל, מוצר. אפשר להדביק מאקסל.</p><textarea id="workerBulk" placeholder="ישראל ישראלי,0500000000,תל אביב,email@test.com,ייעוץ"></textarea><button class="btn dark" onclick="loadClientsToWorker('${w.id}')">טעינת לקוחות לעובד</button></div>`; }

    window.setScreen = s => { state.screen=s; render(); window.scrollTo({top:0,behavior:'smooth'}); };
    window.setUser = id => { state.activeUserId=id; state.screen=id==='manager'?'dashboard':'home'; render(); };
    window.toggleDark = () => { state.dark=!state.dark; save(); render(); };
    window.setSalesDate = v => { state.salesDate=v; render(); };
    window.setClientStatusFilter = s => { state.statusFilter=s; state.screen='clients'; render(); };
    window.openTasks = f => { state.taskFilter=f; state.screen='tasks'; render(); };
    window.openBestWorker = () => { const b=workerStats().sort((a,b)=>b.revenue-a.revenue)[0]; if(b) openWorker(b.id,'clients'); };
    window.openClient = id => { state.selectedClientId=id; state.screen='clients'; render(); };
    window.openWorker = (id, tab='clients') => { state.workerModal={workerId:id, tab:isTaskOnly(id)?'tasks':tab, clientId:'', taskFilter:'הכל'}; render(); };
    window.closeWorker = () => { state.workerModal={workerId:'',tab:'clients',clientId:'',taskFilter:'הכל'}; render(); };
    window.setWorkerTab = t => { state.workerModal.tab=t; render(); };
    window.setWorkerTaskFilter = f => { state.workerModal.tab='tasks'; state.workerModal.taskFilter=f; render(); };
    window.openClientInWorker = id => { state.selectedClientId=id; state.workerModal.clientId=id; render(); };
    window.backToWorker = () => { state.workerModal.clientId=''; render(); };
    window.updateClient = (id, field, value) => { const c=state.clients.find(x=>x.id===id); if(c){ c[field]=value; save(); render(); } };
    window.updateStatus = (id, status) => { const c=state.clients.find(x=>x.id===id); if(c){ c.status=status; if(status==='נסגר / נמכר') c.saleDate=today; c.lastAction='סטטוס עודכן ל-'+status; save(); render(); } };
    window.addClient = () => { const fullName=val('newName'), phone=val('newPhone'); if(!fullName||!phone) return; const w=clientWorkers()[state.nextWorkerIndex % clientWorkers().length]; const ownerId=isManager()?w.id:state.activeUserId; const c=client('C-'+Date.now(),fullName,phone,ownerId,'חדש',0,''); c.email=val('newEmail'); c.city=val('newCity'); c.product=val('newProduct')||'לא צוין'; c.source='הקלדה ידנית'; state.clients.unshift(c); state.selectedClientId=c.id; state.nextWorkerIndex++; save(); render(); };
    window.loadBulkClients = () => { const text=val('bulkText'); if(!text.trim()) return; const rows=text.replaceAll('\r','').split('\n').map(x=>x.trim()).filter(Boolean); const ws=clientWorkers(); rows.forEach((row,i)=>{ const cols=row.replaceAll('\t',',').split(',').map(x=>x.trim()); const ownerId=isManager()?ws[(state.nextWorkerIndex+i)%ws.length].id:state.activeUserId; const c=client('C-'+Date.now()+'-'+i,cols[0]||'לקוח '+(i+1),cols[1]||'',ownerId,'חדש',0,''); c.city=cols[2]||''; c.email=cols[3]||''; c.product=cols[4]||'לא צוין'; c.source='טעינה מטבלה'; state.clients.unshift(c); }); state.nextWorkerIndex+=rows.length; save(); render(); };
    window.addAction = id => { const c=state.clients.find(x=>x.id===id), text=val('actionText'); if(!c||!text) return; c.actions.unshift({id:'A-'+Date.now(),userId:state.activeUserId,type:'פעולה מול לקוח',text,date:today}); c.lastAction=text; save(); render(); };
    window.addReport = id => { const c=state.clients.find(x=>x.id===id), text=val('reportText'); if(!c||!text) return; c.reports.unshift({id:'R-'+Date.now(),userId:state.activeUserId,text,date:today}); c.lastAction='נוסף דיווח משתמש'; save(); render(); };
    window.sendWhatsApp = id => { const c=state.clients.find(x=>x.id===id); if(!c) return; const digits=String(c.phone||'').replace(/[^0-9]/g,''); const phone=digits.startsWith('972')?digits:(digits.startsWith('0')?'972'+digits.slice(1):digits); if(phone) window.open('https://wa.me/'+phone,'_blank','noopener,noreferrer'); c.actions.unshift({id:'A-'+Date.now(),userId:state.activeUserId,type:'WhatsApp',text:'נפתח WhatsApp ללקוח ללא הודעה מוכנה',date:today}); if(c.status==='חדש') c.status='בטיפול'; c.lastAction='נפתח WhatsApp ללקוח'; save(); render(); };
    window.addClientTask = id => { const c=state.clients.find(x=>x.id===id); if(!c) return; c.tasks.unshift({id:'CT-'+Date.now(),type:val('clientTaskType'),status:'פתוחה',ownerId:val('clientTaskOwner')||c.ownerId,dueDate:val('clientTaskDate')||today,note:val('clientTaskNote')}); c.lastAction='נוספה משימה'; save(); render(); };
    window.updateTask = (clientId, taskId, status) => { if(clientId){ const c=state.clients.find(x=>x.id===clientId); if(c){ const t=c.tasks.find(x=>x.id===taskId); if(t) t.status=status; c.lastAction='משימה עודכנה ל-'+status; } } else { const t=state.standaloneTasks.find(x=>x.id===taskId); if(t) t.status=status; } save(); render(); };
    window.removeTask = (clientId, taskId) => { const c=state.clients.find(x=>x.id===clientId); if(c){ c.tasks=c.tasks.filter(t=>t.id!==taskId); c.lastAction='משימה נמחקה'; save(); render(); } };
    window.addClientToWorker = wid => { const fullName=val('wn'), phone=val('wp'); if(!fullName||!phone||isTaskOnly(wid)) return; const c=client('C-'+Date.now(),fullName,phone,wid,'חדש',0,''); c.city=val('wc'); c.email=val('we'); c.product=val('wprod')||'לא צוין'; c.source='הקלדה ידנית בכרטיס עובד'; state.clients.unshift(c); save(); render(); };
    window.loadClientsToWorker = wid => { if(isTaskOnly(wid)) return; const rows=val('workerBulk').replaceAll('\r','').split('\n').map(x=>x.trim()).filter(Boolean); rows.forEach((row,i)=>{ const cols=row.replaceAll('\t',',').split(',').map(x=>x.trim()); const c=client('C-'+Date.now()+'-'+i,cols[0]||'לקוח '+(i+1),cols[1]||'',wid,'חדש',0,''); c.city=cols[2]||''; c.email=cols[3]||''; c.product=cols[4]||'לא צוין'; c.source='טעינה מטבלה בכרטיס עובד'; state.clients.unshift(c); }); save(); render(); };
    window.addWorkerTask = wid => { const taskOnly=isTaskOnly(wid), clientId=taskOnly?'':val('wtClient'); const task={id:'CT-'+Date.now(),type:val('wtType'),status:'פתוחה',ownerId:wid,dueDate:val('wtDate')||today,note:val('wtNote')}; if(clientId){ const c=state.clients.find(x=>x.id===clientId); if(c) c.tasks.unshift(task); } else state.standaloneTasks.unshift(task); save(); render(); };
    window.downloadExcel = () => { const esc=x=>String(x??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); const table=(title,heads,rows)=>`<h2>${esc(title)}</h2><table border="1"><tr>${heads.map(h=>`<th>${esc(h)}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</table><br>`; const html=`<html dir="rtl"><meta charset="utf-8"><body>${table('לקוחות',['שם','טלפון','עיר','מוצר','סטטוס','עובד','מכירות'],visibleClients().map(c=>[c.fullName,c.phone,c.city,c.product,c.status,workerName(c.ownerId),c.saleAmount]))}${table('משימות',['לקוח','משימה','סטטוס','אחראי','יעד','הערה'],visibleTasks().map(t=>[t.clientName,t.type,t.status,workerName(t.ownerId),fmt(t.dueDate),t.note]))}${table('דיווחים',['לקוח','משתמש','תאריך','דיווח'],visibleReports().map(r=>[r.clientName,workerName(r.userId),fmt(r.date),r.text]))}</body></html>`; const blob=new Blob([html],{type:'application/vnd.ms-excel;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='crm-report-'+today+'.xls'; a.click(); };
    function val(id){ const el=document.getElementById(id); return el ? el.value.trim() : ''; }
    render();
  </script>
</body>
</html>
