<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leads CRM · V13 Fixed Navigation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f3f5f8;
      --bg2:#e7ebf1;
      --text:#111827;
      --muted:#667085;
      --line:rgba(17,24,39,.10);
      --card:rgba(255,255,255,.72);
      --card2:rgba(255,255,255,.92);
      --soft:rgba(255,255,255,.58);
      --accent:#5f86ff;
      --accent2:#dce7ff;
      --accentGlow:rgba(95,134,255,.20);
      --shadow:0 20px 48px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.62);
      --shadowSoft:0 12px 28px rgba(15,23,42,.08);
    }
    body.dark{
      --bg:#1c1e22;
      --bg2:#111317;
      --text:#f3f4f6;
      --muted:#a1a7b3;
      --line:rgba(255,255,255,.08);
      --card:rgba(31,33,38,.78);
      --card2:rgba(46,49,56,.90);
      --soft:rgba(255,255,255,.04);
      --accent:#90b4ff;
      --accent2:#f4f7ff;
      --accentGlow:rgba(115,155,255,.20);
      --shadow:0 22px 48px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.04);
      --shadowSoft:0 12px 28px rgba(0,0,0,.22);
    }
    *{box-sizing:border-box;font-family:"Open Sans",Arial,Helvetica,sans-serif}
    html,body{margin:0;padding:0}
    body{
      min-height:100vh;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(255,255,255,.05), transparent 18%),
        radial-gradient(circle at 88% 12%, rgba(105,145,255,.08), transparent 18%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      font-weight:400;
    }
    button,input,select,textarea{font:inherit}
    button{cursor:pointer}
    .page{max-width:1680px;margin:0 auto;padding:18px;display:grid;grid-template-columns:300px 1fr;gap:18px}
    .glass{
      background:var(--card);
      background-image:linear-gradient(135deg,rgba(255,255,255,.72),rgba(255,255,255,.42));
      border:1px solid var(--line);
      box-shadow:var(--shadow);
      backdrop-filter:blur(24px);
      -webkit-backdrop-filter:blur(24px);
    }
    body.dark .glass{background-image:linear-gradient(135deg,rgba(255,255,255,.055),rgba(255,255,255,.018))}
    .sidebar{position:sticky;top:18px;min-height:calc(100vh - 36px);border-radius:34px;padding:16px;overflow:auto}
    .brand{border-radius:28px;padding:18px;background:linear-gradient(180deg,rgba(246,248,252,.96),rgba(229,234,242,.92));color:#111827;border:1px solid rgba(17,24,39,.08);box-shadow:0 20px 44px rgba(15,23,42,.10),inset 0 1px 0 rgba(255,255,255,.72)}
    body.dark .brand{background:linear-gradient(180deg,rgba(20,22,26,.99),rgba(34,36,42,.96));color:#fff;border-color:rgba(255,255,255,.06)}
    .tag{display:inline-flex;padding:7px 12px;border-radius:999px;background:rgba(95,134,255,.10);color:#4f73d9;font-size:12px;font-weight:600;border:1px solid rgba(95,134,255,.18)}
    body.dark .tag{color:#d7d9de;background:rgba(255,255,255,.08);border-color:rgba(130,170,255,.18)}
    .brand h1{margin:12px 0 8px;font-size:30px;line-height:1.02;font-weight:700;letter-spacing:-.02em}
    .brand p{margin:0;color:#667085;font-size:14px;line-height:1.6}
    body.dark .brand p{color:#c9cdd4}
    .brand-stats{margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .mini-box{padding:10px 12px;border-radius:18px;background:rgba(255,255,255,.62);border:1px solid rgba(17,24,39,.08)}
    body.dark .mini-box{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.06)}
    .mini-box b{display:block;font-size:22px;font-weight:600}
    .mini-box span{font-size:12px;color:var(--muted)}
    .nav{display:grid;gap:10px;margin-top:16px}
    .nav button{border:0;text-align:right;width:100%;border-radius:20px;padding:14px 16px;background:transparent;color:var(--muted);font-weight:600;transition:.18s ease}
    .nav button:hover{color:var(--text);background:var(--soft)}
    .nav button.active,.primary{
      color:#1f2937!important;
      background:linear-gradient(135deg,#eef3ff 0%,#cfdcff 52%,#9fbaff 100%)!important;
      box-shadow:0 16px 34px rgba(115,155,255,.22),inset 0 1px 0 rgba(255,255,255,.62)!important;
      border:1px solid rgba(255,255,255,.34)!important;
    }
    .side-actions{display:grid;gap:12px;margin-top:16px}
    .toggle-card{border-radius:22px;padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .switch{width:72px;height:40px;border:0;border-radius:999px;position:relative;background:var(--card2);border:1px solid var(--line);box-shadow:var(--shadowSoft)}
    .switch span{position:absolute;top:4px;right:4px;width:30px;height:30px;border-radius:50%;background:linear-gradient(180deg,#f8f8f9,#c9ccd3);box-shadow:0 8px 18px rgba(15,23,42,.16);transition:.22s ease}
    body.dark .switch span{right:38px}
    .btn{border:0;border-radius:18px;padding:12px 16px;font-weight:600;transition:.18s ease;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;color:var(--text);background:var(--card2);border:1px solid var(--line);box-shadow:var(--shadowSoft)}
    .btn:hover,.clickable:hover,.stat:hover{transform:translateY(-2px)}
    .btn.danger{background:#dc2626;color:white}
    body.dark .btn.danger{background:#8f3b3b}
    .main{min-width:0}
    .hero{border-radius:34px;padding:18px 20px;margin-bottom:16px}
    .hero-top{display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap}
    .hero h2{margin:0;font-size:40px;line-height:1;font-weight:700;letter-spacing:-.02em}
    .hero-actions{display:flex;gap:10px;flex-wrap:wrap}
    .grid5{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px}
    .grid2{display:grid;grid-template-columns:1.1fr .9fr;gap:16px;margin-top:16px}
    .split{display:grid;grid-template-columns:1.08fr .92fr;gap:16px}
    .card{border-radius:32px;padding:20px}
    .head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:14px}
    h3{margin:0 0 14px;font-size:24px;font-weight:600;letter-spacing:-.01em}
    .sub{color:var(--muted);font-size:12px;font-weight:500}
    .badge{display:inline-flex;padding:7px 12px;border-radius:999px;background:rgba(95,134,255,.10);color:#4f73d9;font-size:12px;font-weight:600;border:1px solid rgba(115,155,255,.20)}
    body.dark .badge{color:#9db9ff}
    .stat{border-radius:26px;padding:18px;position:relative;overflow:hidden;text-align:right;color:var(--text);border:1px solid var(--line);background:var(--card2);box-shadow:var(--shadowSoft)}
    .stat .label{font-size:13px;color:var(--muted);font-weight:600}
    .stat .value{font-size:34px;font-weight:600;margin-top:12px;letter-spacing:-.02em}
    .stat .subtext{font-size:12px;color:var(--muted);margin-top:4px}
    .stat-top{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .icon{width:42px;height:42px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(95,134,255,.13),rgba(255,255,255,.76));border:1px solid rgba(95,134,255,.16)}
    body.dark .icon{background:linear-gradient(135deg,rgba(255,255,255,.18),rgba(120,160,255,.14))}
    .list{display:grid;gap:12px}
    .row,.item{border-radius:22px;padding:15px 16px;background:var(--card2);border:1px solid var(--line);box-shadow:var(--shadowSoft);color:inherit;text-align:right}
    .clickable{cursor:pointer}
    .title-row{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .title{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-weight:600}
    .meta{color:var(--muted);font-size:13px;line-height:1.7;margin-top:4px}
    .pill{display:inline-flex;align-items:center;justify-content:center;min-height:26px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;background:var(--soft);border:1px solid var(--line);color:var(--muted)}
    .pill.new{background:rgba(95,134,255,.12);color:#315fd4}
    .pill.work{background:rgba(212,151,32,.14);color:#a86e00}
    .pill.done{background:rgba(20,184,166,.13);color:#0f766e}
    body.dark .pill.new{color:#95b4ff}
    body.dark .pill.work{color:#ffd277}
    body.dark .pill.done{color:#7ef0dc}
    .bar{margin-top:8px;height:14px;border-radius:999px;background:rgba(148,163,184,.16);border:1px solid var(--line);overflow:hidden}
    .bar>div{height:100%;border-radius:999px;background:linear-gradient(90deg,#5f86ff 0%,#8fb0ff 75%,#dce7ff 100%)}
    .filters,.formgrid{display:grid;grid-template-columns:1fr 180px 180px;gap:12px;margin-bottom:14px}
    .formgrid{grid-template-columns:1fr 1fr;margin-bottom:0}
    input,select,textarea{width:100%;padding:13px 14px;border-radius:18px;border:1px solid var(--line);background:var(--card2);color:var(--text);outline:none;box-shadow:inset 0 1px 1px rgba(255,255,255,.08),var(--shadowSoft);font-weight:400}
    textarea{min-height:96px;resize:vertical}
    label{display:block;font-size:14px;font-weight:600}
    label>input,label>select,label>textarea{margin-top:8px}
    .details{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px;padding:14px;border-radius:22px;background:var(--soft);border:1px solid var(--line)}
    .actions{display:flex;gap:10px;flex-wrap:wrap}
    .sticky{position:sticky;top:18px}
    .divider{height:1px;background:var(--line);margin:16px 0}
    .empty{text-align:center;padding:18px;border-radius:22px;border:1px dashed var(--line);background:var(--soft);color:var(--muted)}
    .tablewrap{overflow:auto;border-radius:24px;border:1px solid var(--line);background:var(--card2);box-shadow:var(--shadowSoft)}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:12px 14px;border-bottom:1px solid var(--line);text-align:right;font-size:13px}
    th{color:var(--muted);font-weight:600;background:var(--soft)}
    tr:last-child td{border-bottom:0}
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:50;display:none;align-items:center;justify-content:center;padding:18px}
    .modal-bg.active{display:flex}
    .modal{width:min(1120px,100%);max-height:90vh;overflow:auto;border-radius:34px;padding:20px}
    .taskgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
    .mobile-nav{display:none}
    @media(max-width:1300px){.grid5{grid-template-columns:repeat(3,1fr)}.grid2,.split,.taskgrid{grid-template-columns:1fr}.sticky{position:static}}
    @media(max-width:980px){.page{grid-template-columns:1fr}.sidebar{position:static;min-height:auto}.hero h2{font-size:32px}.filters,.formgrid,.details{grid-template-columns:1fr}.grid5{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:640px){.page{padding:12px}.grid5{grid-template-columns:1fr}.hero h2{font-size:26px}.brand h1{font-size:26px}.card,.hero,.sidebar{border-radius:26px}.mobile-nav{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;position:sticky;bottom:10px;z-index:10;margin-top:12px}.mobile-nav button{border:0;border-radius:18px;padding:11px 8px;background:var(--card2);border:1px solid var(--line);box-shadow:var(--shadowSoft);color:var(--muted);font-weight:600}.mobile-nav button.active{color:#1f2937!important;background:linear-gradient(135deg,#eef3ff 0%,#cfdcff 52%,#9fbaff 100%)!important}}
  </style>
</head>

</div>

function pill(status){if(status==="חדש")return"pill new"; if(status==="בטיפול"||status==="פתוחה")return"pill work"; if(status==="הושלמה"||status==="נסגר / נמכר")return"pill done"; return"pill"}

function metrics(){
  const closed=leads.filter(l=>l.status==="נסגר / נמכר");
  return {
    incomingToday:leads.filter(l=>l.createdAt===today).length,
    closed:closed.length,
    open:leads.filter(l=>!["נסגר / נמכר","לא רלוונטי"].includes(l.status)).length,
    dueFollowups:leads.filter(l=>l.followUpAt&&l.followUpAt<=today&&l.status!=="נסגר / נמכר").length,
    totalSales:closed.reduce((s,l)=>s+Number(l.saleAmount||0),0),
    conversionRate:leads.length?Math.round((closed.length/leads.length)*100):0
  }
}
function taskMetrics(){
  return {
    total:tasks.length,
    open:tasks.filter(t=>t.status!=="הושלמה").length,
    inProgress:tasks.filter(t=>t.status==="בטיפול").length,
    completed:tasks.filter(t=>t.status==="הושלמה").length,
    overdue:tasks.filter(t=>t.status!=="הושלמה"&&t.dueDate&&t.dueDate<today).length
  }
}
function workerStats(){
  return workers.map(w=>{
    const wl=leads.filter(l=>l.ownerId===w.id);
    const wt=tasks.filter(t=>t.ownerId===w.id);
    const closed=wl.filter(l=>l.status==="נסגר / נמכר");
    return {...w,total:wl.length,closed:closed.length,openTasks:wt.filter(t=>t.status!=="הושלמה").length,inProgressTasks:wt.filter(t=>t.status==="בטיפול").length,doneTasks:wt.filter(t=>t.status==="הושלמה").length,revenue:closed.reduce((s,l)=>s+Number(l.saleAmount||0),0)}
  })
}
function stat(title,value,sub="",icon="✦",action=""){

}
function statusCounts(){return statuses.map(status=>({status,count:leads.filter(l=>l.status===status).length}))}

function renderWorkerModal(){
  const worker=workers.find(w=>w.id===selectedWorkerId); if(!worker)return;
  const ws=workerStats().find(w=>w.id===worker.id), workerTasks=tasks.filter(t=>t.ownerId===worker.id), workerLeads=leads.filter(l=>l.ownerId===worker.id);
  document.getElementById("workerModalContent").innerHTML=`<div class="head"><div><h3 style="font-size:30px;margin-bottom:4px">${worker.name}</h3><div class="sub">${worker.role} · ${workerLeads.length} לידים · ${workerTasks.length} משימות</div></div><div class="actions"><button class="btn" onclick="goToWorkerLeads('${worker.id}')">לידים של העובד</button><button class="btn" onclick="goToWorkerTasks('${worker.id}')">משימות של העובד</button><button class="btn" onclick="closeWorkerModal()">סגירה</button></div></div><div class="grid5" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">${stat("לידים",ws.total,"","◎",`goToWorkerLeads('${worker.id}')`)}${stat("סגירות",ws.closed,"","✓",`leadOwnerFilter='${worker.id}';leadStatusFilter='נסגר / נמכר';closeWorkerModal();go('leads')`)}${stat("בטיפול",ws.inProgressTasks,"משימות","◔",`goToWorkerTasks('${worker.id}','בטיפול')`)}${stat("הושלמו",ws.doneTasks,"משימות","✓",`goToWorkerTasks('${worker.id}','הושלמה')`)}</div><div class="taskgrid"><div class="card glass" style="box-shadow:none"><h3>משימות של ${worker.name}</h3><div class="list">${workerTasks.length?workerTasks.map(taskRow).join(""):`<div class="empty">אין משימות לעובד הזה</div>`}</div></div><div class="card glass" style="box-shadow:none"><h3>הוספת משימה לעובד</h3><div class="list"><input id="workerTaskTitle" placeholder="כותרת משימה"><textarea id="workerTaskDescription" placeholder="פירוט המשימה"></textarea><label>ליד מקושר<select id="workerTaskLead"><option value="">ללא ליד מקושר</option>${workerLeads.map(l=>`<option value="${l.id}">${esc(l.fullName)}</option>`).join("")}</select></label><label>עדיפות<select id="workerTaskPriority">${priorities.map(p=>`<option>${p}</option>`).join("")}</select></label><label>תאריך יעד<input id="workerTaskDue" type="date" value="${today}"></label><button class="btn primary" onclick="addWorkerTask('${worker.id}')">הוספת משימה</button></div><div class="divider"></div><h3>לידים של העובד</h3><div class="list">${workerLeads.length?workerLeads.map(l=>`<button class="item clickable" onclick="goToLead('${l.id}')"><div class="title">${esc(l.fullName)} <span class="${pill(l.status)}">${l.status}</span></div><div class="meta">${esc(l.phone)} · ${esc(l.product)}</div></button>`).join(""):`<div class="empty">אין לידים לעובד הזה</div>`}</div></div></div>`
}
function addWorkerTask(workerId){
  const title=document.getElementById("workerTaskTitle").value.trim(); if(!title)return alert("צריך כותרת משימה");
  tasks=[{id:"T-"+Date.now(),title,description:document.getElementById("workerTaskDescription").value.trim(),ownerId:workerId,relatedLeadId:document.getElementById("workerTaskLead").value,status:"פתוחה",priority:document.getElementById("workerTaskPriority").value,dueDate:document.getElementById("workerTaskDue").value||today,createdAt:today},...tasks];
  save();render();renderWorkerModal();
}

function renderReports(){
  const m=metrics(), tm=taskMetrics(), rows=workerStats(), counts=statusCounts();
  return `<div class="card glass"><div class="head"><div><h3>דוחות על המסך</h3><div class="sub">אפשר לראות כאן וגם להוריד לאקסל</div></div><div class="actions"><button class="btn primary" onclick="downloadExcelReport()">הורדה לאקסל</button><button class="btn" onclick="window.print()">הדפסה / PDF</button></div></div><div class="grid5" style="margin-bottom:16px">${stat("כל הלידים",leads.length,"","◎","go('leads')")}${stat("פתוחים",m.open,"","◔","go('leads')")}${stat("סגירות",m.closed,`${m.conversionRate}% המרה`,"✓","goToLeadsByStatus('נסגר / נמכר')")}${stat("משימות",tasks.length,`${tm.completed} הושלמו`,"≣","go('tasks')")}${stat("מכירות","₪"+m.totalSales.toLocaleString("he-IL"),"","₪","")}</div><div class="grid2"><div><h3>דוח עובדים</h3><div class="tablewrap"><table><thead><tr><th>עובד</th><th>תפקיד</th><th>לידים</th><th>סגירות</th><th>משימות פתוחות</th><th>בטיפול</th><th>הושלמו</th><th>מכירות</th></tr></thead><tbody>${rows.map(w=>`<tr onclick="goToWorker('${w.id}')" style="cursor:pointer"><td>${w.name}</td><td>${w.role}</td><td>${w.total}</td><td>${w.closed}</td><td>${w.openTasks}</td><td>${w.inProgressTasks}</td><td>${w.doneTasks}</td><td>₪${w.revenue.toLocaleString("he-IL")}</td></tr>`).join("")}</tbody></table></div></div><div><h3>דוח סטטוסים</h3><div class="tablewrap"><table><thead><tr><th>סטטוס</th><th>כמות</th><th>פעולה</th></tr></thead><tbody>${counts.map(c=>`<tr><td>${c.status}</td><td>${c.count}</td><td><button class="btn" onclick="goToLeadsByStatus('${c.status}')">פתיחה</button></td></tr>`).join("")}</tbody></table></div></div></div><div style="margin-top:16px"><h3>דוח לידים מלא</h3><div class="tablewrap"><table><thead><tr><th>שם</th><th>טלפון</th><th>עיר</th><th>מוצר</th><th>סטטוס</th><th>עובד</th><th>תאריך</th><th>Follow‑up</th></tr></thead><tbody>${leads.map(l=>`<tr onclick="goToLead('${l.id}')" style="cursor:pointer"><td>${esc(l.fullName)}</td><td>${esc(l.phone)}</td><td>${esc(l.city)}</td><td>${esc(l.product)}</td><td>${l.status}</td><td>${workerName(l.ownerId)}</td><td>${fmt(l.createdAt)}</td><td>${fmt(l.followUpAt)}</td></tr>`).join("")}</tbody></table></div></div></div>`
}
function excelEscape(v){return String(v??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function tableHtml(title,headers,rows){return `<h2>${excelEscape(title)}</h2><table border="1"><thead><tr>${headers.map(h=>`<th>${excelEscape(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${excelEscape(c)}</td>`).join("")}</tr>`).join("")}</tbody></table><br>`}
function downloadExcelReport(){
  const m=metrics(), tm=taskMetrics();
  const html=`<html dir="rtl"><head><meta charset="UTF-8"></head><body>${tableHtml("סיכום מנהלים",["מדד","ערך"],[["כל הלידים",leads.length],["פתוחים",m.open],["סגירות",m.closed],["אחוז המרה",m.conversionRate+"%"],["משימות",tasks.length],["משימות בטיפול",tm.inProgress],["משימות הושלמו",tm.completed],["מכירות",m.totalSales]])}${tableHtml("דוח עובדים",["עובד","תפקיד","לידים","סגירות","משימות פתוחות","בטיפול","הושלמו","מכירות"],workerStats().map(w=>[w.name,w.role,w.total,w.closed,w.openTasks,w.inProgressTasks,w.doneTasks,w.revenue]))}${tableHtml("דוח סטטוסי לידים",["סטטוס","כמות"],statusCounts().map(c=>[c.status,c.count]))}${tableHtml("דוח לידים",["שם","טלפון","עיר","מוצר","סטטוס","עובד","תאריך","Follow-up"],leads.map(l=>[l.fullName,l.phone,l.city,l.product,l.status,workerName(l.ownerId),fmt(l.createdAt),fmt(l.followUpAt)]))}${tableHtml("דוח משימות",["כותרת","תיאור","אחראי","ליד","סטטוס","עדיפות","יעד"],tasks.map(t=>[t.title,t.description,workerName(t.ownerId),leadName(t.relatedLeadId),t.status,t.priority,fmt(t.dueDate)]))}</body></html>`;
  const blob=new Blob([html],{type:"application/vnd.ms-excel;charset=utf-8"}), url=URL.createObjectURL(blob), a=document.createElement("a");
  a.href=url; a.download="crm-reports-"+new Date().toISOString().slice(0,10)+".xls"; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}

function render(){
  setActiveNav();
  const content=document.getElementById("content");
  if(activeScreen==="dashboard") content.innerHTML=renderDashboard();
  if(activeScreen==="leads") content.innerHTML=renderLeads();
  if(activeScreen==="followups") content.innerHTML=renderFollowups();
  if(activeScreen==="tasks") content.innerHTML=renderTasks();
  if(activeScreen==="reports") content.innerHTML=renderReports();
  if(activeScreen==="team") content.innerHTML=renderTeam();
  document.getElementById("brandLeads").textContent=leads.length;
  document.getElementById("brandWorkers").textContent=workers.length;
}
themeInit();
render();
</script>
</body>
</html>
