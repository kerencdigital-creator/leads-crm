function normalizePhone(phone){
  const digits = String(phone || "").replace(/[^0-9]/g,"");
  if(!digits) return "";
  if(digits.startsWith("972")) return digits;
  if(digits.startsWith("0")) return "972" + digits.slice(1);
  return digits;
}

  const activeUser = workers.find(w => w.id === activeUserId) || workers[0];
  const isManager = !!activeUser.isManager;

  const navigateTo = screen => { setActiveScreen(screen); window.scrollTo({top:0,behavior:"smooth"}); };
  const visibleClients = useMemo(() => {
    if(!isManager && isTaskOnlyWorker(activeUserId)) return [];
    return isManager ? clients : clients.filter(c => c.ownerId === activeUserId);
  }, [isManager, activeUserId, clients]);

  const selectedClient = clients.find(c => c.id === selectedClientId) || visibleClients[0] || clients[0];

  const filteredClients = useMemo(() => {
    const q = query.trim().toLowerCase();
    return visibleClients.filter(c => {
      const matchesQ = !q || c.fullName.toLowerCase().includes(q) || c.phone.includes(q) || c.city.toLowerCase().includes(q) || (c.email||"").toLowerCase().includes(q);
      const matchesStatus = statusFilter === "הכל" || c.status === statusFilter;
      const matchesOwner = !isManager || ownerFilter === "הכל" || c.ownerId === ownerFilter;
      return matchesQ && matchesStatus && matchesOwner;
    });
  }, [visibleClients, query, statusFilter, ownerFilter, isManager]);

  const flatTasks = useMemo(() => {
    const clientTasks = clients.flatMap(c => c.tasks.map(t => ({...t, clientId:c.id, clientName:c.fullName, standalone:false})));
    const internal = standaloneTasks.map(t => ({...t, clientId:"", clientName:"ללא לקוח מקושר", standalone:true}));
    return [...clientTasks, ...internal];
  }, [clients, standaloneTasks]);

  const taskMatches = (task, filter) => filter === "הכל" ? true : filter === "פתוחות" ? task.status !== "משימה הושלמה" : task.status === filter;

  const visibleTasks = useMemo(() => {
    const base = isManager ? flatTasks : flatTasks.filter(t => t.ownerId === activeUserId);
    return base;
  }, [isManager, flatTasks, activeUserId]);

  const reports = useMemo(() => clients.flatMap(c => c.reports.map(r => ({...r, clientId:c.id, clientName:c.fullName}))), [clients]);
  const visibleReports = isManager ? reports : reports.filter(r => r.userId === activeUserId);

  const metrics = useMemo(() => {
    const closedByDate = visibleClients.filter(c => c.status === "נסגר / נמכר" && (c.saleDate || c.createdAt) === salesDateFilter);
    const closedToday = visibleClients.filter(c => c.status === "נסגר / נמכר" && (c.saleDate || c.createdAt) === today);
    return {
      salesToday: closedToday.reduce((s,c)=>s+Number(c.saleAmount||0),0),
      salesByDate: closedByDate.reduce((s,c)=>s+Number(c.saleAmount||0),0),
      closedByDate: closedByDate.length,
      clientsTotal: visibleClients.length,
      openTasks: visibleTasks.filter(t=>t.status !== "משימה הושלמה").length,
      completedTasks: visibleTasks.filter(t=>t.status === "משימה הושלמה").length,
      reportsTotal: visibleReports.length,
    }
  }, [visibleClients, visibleTasks, visibleReports, salesDateFilter]);

  const workerStats = useMemo(() => workers.filter(w=>!w.isManager).map(w => {
    const workerClients = isTaskOnlyWorker(w.id) ? [] : clients.filter(c=>c.ownerId === w.id);
    const workerTasks = flatTasks.filter(t=>t.ownerId === w.id);
    return {
      ...w,
      clientsTotal: workerClients.length,
      revenue: workerClients.filter(c=>c.status==="נסגר / נמכר").reduce((s,c)=>s+Number(c.saleAmount||0),0),
      salesByDate: workerClients.filter(c=>c.status==="נסגר / נמכר" && (c.saleDate || c.createdAt) === salesDateFilter).reduce((s,c)=>s+Number(c.saleAmount||0),0),
      openTasks: workerTasks.filter(t=>t.status !== "משימה הושלמה").length,
      inProgressTasks: workerTasks.filter(t=>t.status === "משימה בטיפול").length,
      completedTasks: workerTasks.filter(t=>t.status === "משימה הושלמה").length,
      reportsTotal: reports.filter(r=>r.userId === w.id).length,
    }
  }), [clients, flatTasks, reports, salesDateFilter]);

  const statusStats = clientStatuses.map(status => ({status, count: visibleClients.filter(c=>c.status === status).length}));
  const bestWorker = [...workerStats].sort((a,b)=> (b.revenue + b.clientsTotal*10 + b.completedTasks*5) - (a.revenue + a.clientsTotal*10 + a.completedTasks*5))[0];

  function setClient(id, changes){ setClients(prev => prev.map(c => c.id === id ? {...c, ...changes} : c)); }
  function updateClientField(id, field, value){ setClients(prev => prev.map(c => c.id === id ? {...c, [field]:value} : c)); }

  function addClient(ownerIdArg){
    if(isTaskOnlyWorker(activeUserId) && !ownerIdArg) return;
    if(!newClient.fullName.trim() || !newClient.phone.trim()) return;
    const owner = ownerIdArg || (isManager ? clientEnabledWorkers()[clients.length % clientEnabledWorkers().length].id : activeUserId);
    const client = {
      id:"C-"+Date.now(), fullName:newClient.fullName.trim(), phone:newClient.phone.trim(), email:newClient.email.trim(), city:newClient.city.trim(),
      product:newClient.product.trim() || "לא צוין", source:"הקלדה ידנית", status:"חדש", ownerId:owner, createdAt:today, followUpAt:today, saleAmount:0,
      lastAction:"לקוח נוסף ידנית", actions:[{id:"A-"+Date.now(), userId:activeUserId, type:"יצירת לקוח", text:"לקוח נוסף ידנית", date:today}], reports:[], tasks:[]
    };
    setClients([client, ...clients]); setSelectedClientId(client.id); setNewClient({fullName:"",phone:"",email:"",city:"",product:""}); navigateTo("clients");
  }

  function loadBulkClients(ownerIdArg, textArg){
    const text = textArg ?? bulkText;
    const rows = text.replaceAll("\r","").split("\n").map(r=>r.trim()).filter(Boolean);
    if(!rows.length) return;
    const salesWorkers = clientEnabledWorkers();
    const created = rows.map((row, i) => {
      const [fullName="", phone="", city="", email="", product=""] = row.replaceAll("\t",",").split(",").map(x=>x.trim());
      const owner = ownerIdArg || (isManager ? salesWorkers[(clients.length + i) % salesWorkers.length].id : activeUserId);
      return { id:"C-"+Date.now()+"-"+i, fullName:fullName || `לקוח ${i+1}`, phone, email, city, source:"טעינה מטבלה", product:product || "לא צוין", status:"חדש", ownerId:owner, createdAt:today, followUpAt:today, saleAmount:0, lastAction:"נטען מטבלה", actions:[{id:"A-"+Date.now()+"-"+i, userId:activeUserId, type:"טעינת לקוח", text:"לקוח נטען מטבלה", date:today}], reports:[], tasks:[] };
    });
    setClients([...created, ...clients]); setSelectedClientId(created[0].id); setBulkText(""); setWorkerBulkText("");
  }

  function addActionToClient(client = selectedClient){
    if(!client || !newAction.trim()) return;
    const action = {id:"A-"+Date.now(), userId:activeUserId, type:"פעולה מול לקוח", text:newAction.trim(), date:today};
    setClient(client.id, { actions:[action, ...client.actions], lastAction:newAction.trim() });
    setNewAction("");
  }

  function addReportToClient(client = selectedClient){
    if(!client || !newReport.trim()) return;
    const report = {id:"R-"+Date.now(), userId:activeUserId, text:newReport.trim(), date:today};
    setClient(client.id, { reports:[report, ...client.reports], lastAction:"נוסף דיווח משתמש" });
    setNewReport("");
  }

  function sendWhatsAppToClient(client){
    const phone = normalizePhone(client.phone);
    if(!phone) return;
    window.open(`https://wa.me/${phone}`, "_blank", "noopener,noreferrer");
    const action = {id:"A-"+Date.now(), userId:activeUserId, type:"WhatsApp", text:"נפתח WhatsApp ללקוח ללא הודעה מוכנה", date:today};
    setClient(client.id, { actions:[action, ...client.actions], lastAction:"נפתח WhatsApp ללקוח", status: client.status === "חדש" ? "בטיפול" : client.status });
  }

  function addTaskToClient(client = selectedClient){
    if(!client) return;
    const task = { id:"CT-"+Date.now(), type:newClientTask.type, status:"פתוחה", ownerId:newClientTask.ownerId || client.ownerId, dueDate:newClientTask.dueDate || today, note:newClientTask.note.trim() };
    setClient(client.id, { tasks:[task, ...client.tasks], lastAction:`נוספה משימה: ${task.type}` });
    setNewClientTask({type:clientTaskTypes[0], ownerId:"", dueDate:today, note:""});
  }

  function updateClientTask(clientId, taskId, changes){
    if(!clientId){
      setStandaloneTasks(prev => prev.map(t => t.id === taskId ? {...t, ...changes} : t));
      return;
    }
    setClients(prev => prev.map(c => c.id !== clientId ? c : {...c, tasks:c.tasks.map(t => t.id === taskId ? {...t, ...changes} : t), lastAction: changes.status ? `משימה עודכנה ל-${changes.status}` : c.lastAction}));
  }

  function openClient(clientId){ setSelectedClientId(clientId); navigateTo("clients"); }
  function openWorkerPanel(workerId, tab="clients"){
    const taskOnly = isTaskOnlyWorker(workerId);
    setSelectedWorkerPanelId(workerId);
    setWorkerPanelClientId("");
    setWorkerPanelTab(taskOnly ? "tasks" : tab);
    setWorkerTaskStatusFilter("הכל");
    setWorkerTaskDraft({clientId:"", type:taskOnly ? employeeTaskTypes[0] : clientTaskTypes[0], dueDate:today, note:""});
  }

  function addWorkerTask(){
    if(!selectedWorkerPanelId) return;
    const task = { id:"CT-"+Date.now(), type:workerTaskDraft.type, status:"פתוחה", ownerId:selectedWorkerPanelId, dueDate:workerTaskDraft.dueDate || today, note:workerTaskDraft.note.trim() };
    if(workerTaskDraft.clientId){
      setClients(prev => prev.map(c => c.id === workerTaskDraft.clientId ? {...c, tasks:[task, ...c.tasks], lastAction:`נוספה משימה לעובד: ${task.type}`} : c));
    } else {
      setStandaloneTasks(prev => [task, ...prev]);
    }
    setWorkerTaskDraft({clientId:"", type:isTaskOnlyWorker(selectedWorkerPanelId) ? employeeTaskTypes[0] : clientTaskTypes[0], dueDate:today, note:""});
  }

  function downloadExcel(){
    const escape = v => String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    const table = (title, headers, rows) => `<h2>${escape(title)}</h2><table border="1"><thead><tr>${headers.map(h=>`<th>${escape(h)}</th>`).join("")}</tr></thead><tbody>${rows.map(row=>`<tr>${row.map(c=>`<td>${escape(c)}</td>`).join("")}</tr>`).join("")}</tbody></table><br/>`;
    const html = `<html dir="rtl"><head><meta charset="UTF-8"/></head><body>
      ${table("לקוחות", ["שם","טלפון","עיר","מוצר","סטטוס","עובד","מכירה","פעולה אחרונה"], visibleClients.map(c=>[c.fullName,c.phone,c.city,c.product,c.status,getWorkerName(c.ownerId),c.saleAmount,c.lastAction]))}
      ${table("משימות", ["לקוח","משימה","סטטוס","אחראי","תאריך יעד","הערה"], visibleTasks.map(t=>[t.clientName,t.type,t.status,getWorkerName(t.ownerId),formatDate(t.dueDate),t.note]))}
      ${table("דיווחים", ["לקוח","משתמש","תאריך","דיווח"], visibleReports.map(r=>[r.clientName,getWorkerName(r.userId),formatDate(r.date),r.text]))}
    </body></html>`;
    const blob = new Blob([html], {type:"application/vnd.ms-excel;charset=utf-8"});
    const url = URL.createObjectURL(blob); const a = document.createElement("a");
    a.href = url; a.download = `crm-report-${new Date().toISOString().slice(0,10)}.xls`; a.click(); URL.revokeObjectURL(url);
  }

  function renderClientTasks(client){
    return (
      <div className="space-y-2">
        {client.tasks.length === 0 && <p className="text-sm text-slate-500">אין משימות שמקושרות ללקוח הזה.</p>}
        {client.tasks.map(task => (
          <div key={task.id} className="rounded-2xl bg-slate-50 p-3">
            <div className="flex flex-wrap justify-between gap-2">
              <div>
                <p className="font-bold">{task.type}</p>
                <p className="text-xs text-slate-500">אחראי: {getWorkerName(task.ownerId)} · יעד: {formatDate(task.dueDate)}</p>
                {task.note && <p className="text-sm text-slate-600">{task.note}</p>}
              </div>
              <Pill>{task.status}</Pill>
            </div>
            <div className="mt-3 flex flex-wrap gap-2">
              {taskStatuses.map(s => <Button key={s} variant="ghost" className="text-xs" onClick={()=>updateClientTask(client.id, task.id, {status:s})}>{s}</Button>)}
            </div>
          </div>
        ))}
      </div>
    )
  }

  const selectedWorkerPanel = workers.find(w => w.id === selectedWorkerPanelId);
  const selectedWorkerIsTaskOnly = selectedWorkerPanelId ? isTaskOnlyWorker(selectedWorkerPanelId) : false;
  const workerPanelClients = selectedWorkerPanelId && !selectedWorkerIsTaskOnly ? clients.filter(c=>c.ownerId===selectedWorkerPanelId) : [];
  const workerPanelTasks = selectedWorkerPanelId ? flatTasks.filter(t=>t.ownerId === selectedWorkerPanelId) : [];
  const displayedWorkerPanelTasks = workerPanelTasks.filter(t=>taskMatches(t, workerTaskStatusFilter));
  const workerPanelStats = selectedWorkerPanelId ? workerStats.find(w=>w.id===selectedWorkerPanelId) : null;
  const workerPanelClient = workerPanelClientId ? clients.find(c=>c.id === workerPanelClientId) : null;

  const rootClass = dark ? "theme-dark app-bg" : "app-bg";

  return (
    <div className={rootClass} dir="rtl">
      <div className="layout flex min-h-screen">
        <aside className="w-[300px] shrink-0 border-l border-slate-200 bg-white/80 p-4 lg:sticky lg:top-0 lg:h-screen">
          <div className="mb-5 rounded-3xl bg-slate-950 p-5 text-white">
            <p className="text-sm text-slate-300">CRM עובדים</p>
            <h1 className="mt-1 text-2xl font-extrabold">ניהול לקוחות ומכירות</h1>
            <p className="mt-2 text-sm text-slate-300">משתמש אישי + מנהל לידים</p>
          </div>

          <div className="mb-4 rounded-3xl bg-slate-50 p-3">
            <ThemeToggle dark={dark} setDark={setDark} />
            <label className="mt-4 block text-xs font-bold text-slate-500">כניסה כמשתמש</label>
            <Select value={activeUserId} onChange={e => { setActiveUserId(e.target.value); setActiveScreen(e.target.value==="manager" ? "dashboard" : "home"); }}>
              {workers.map(w => <option key={w.id} value={w.id}>{w.name} · {w.role}</option>)}
            </Select>
          </div>

          <nav className="grid gap-2">
            {isManager && <SidebarButton icon="▥" active={activeScreen==="dashboard"} onClick={()=>navigateTo("dashboard")}>דשבורד מנהלים</SidebarButton>}
            <SidebarButton icon="⌂" active={activeScreen==="home"} onClick={()=>navigateTo("home")}>מסך בית</SidebarButton>
            {!isTaskOnlyWorker(activeUserId) && <SidebarButton icon="▤" active={activeScreen==="clients"} onClick={()=>navigateTo("clients")}>טבלת לקוחות</SidebarButton>}
            <SidebarButton icon="✓" active={activeScreen==="tasks"} onClick={()=>navigateTo("tasks")}>משימות</SidebarButton>
            <SidebarButton icon="↧" active={activeScreen==="reports"} onClick={()=>navigateTo("reports")}>דוחות ודיווחים</SidebarButton>
            {isManager && <SidebarButton icon="👥" active={activeScreen==="manager"} onClick={()=>navigateTo("manager")}>מנהל לידים</SidebarButton>}
          </nav>
        </aside>

        <main className="flex-1 p-5 md:p-8">
          <div className="mx-auto max-w-7xl space-y-6">
            <header className="glass rounded-[30px] p-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
              <div>
                <p className="text-sm font-bold text-slate-500">משתמש פעיל: {activeUser.name} · {activeUser.role}</p>
                <h2 className="text-4xl font-extrabold tracking-tight">
                  {activeScreen==="dashboard" && "דשבורד מנהלים"}
                  {activeScreen==="home" && "מסך בית"}
                  {activeScreen==="clients" && "טבלת לקוחות"}
                  {activeScreen==="tasks" && "משימות"}
                  {activeScreen==="reports" && "דוחות ודיווחים"}
                  {activeScreen==="manager" && "מנהל לידים"}
                </h2>
              </div>
              <div className="flex flex-wrap gap-2">
                <ThemeToggle dark={dark} setDark={setDark} />
                {!isTaskOnlyWorker(activeUserId) && <Button onClick={()=>navigateTo("clients")} className="blue-pill">+ הוספת לקוח</Button>}
              </div>
            </header>

            {activeScreen === "dashboard" && isManager && (
              <div className="space-y-6">
                <Card className="p-5">
                  <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                    <div>
                      <h3 className="text-xl font-extrabold">פילטור סך המכירות לפי תאריך</h3>
                      <p className="text-sm text-slate-500">מציג את סך המכירות והסגירות בתאריך שנבחר.</p>
                    </div>
                    <div className="md:w-72">
                      <Input type="date" value={salesDateFilter} onChange={e=>setSalesDateFilter(e.target.value)} />
                      <p className="mt-2 text-sm font-bold">₪{metrics.salesByDate.toLocaleString("he-IL")} · {metrics.closedByDate} סגירות</p>
                    </div>
                  </div>
                </Card>

                <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
                  <StatCard icon="◎" title="לידים שנכנסו היום" value={visibleClients.filter(c=>c.createdAt===today).length} subtitle="לחיצה תציג לידים חדשים" onClick={()=>{setStatusFilter("חדש"); navigateTo("clients")}} />
                  <StatCard icon="✓" title="סגירות" value={visibleClients.filter(c=>c.status==="נסגר / נמכר").length} subtitle="אחוז המרה כללי" onClick={()=>{setStatusFilter("נסגר / נמכר"); navigateTo("clients")}} />
                  <StatCard icon="⏰" title="תזכורות פתוחות" value={visibleClients.filter(c=>c.followUpAt && c.status!=="נסגר / נמכר").length} subtitle="Follow-up פתוח" onClick={()=>navigateTo("clients")} />
                  <StatCard icon="✓" title="משימות עובדים פתוחות" value={flatTasks.filter(t=>t.status!=="משימה הושלמה").length} subtitle={`${flatTasks.filter(t=>t.status==="משימה הושלמה").length} הושלמו`} onClick={()=>navigateTo("tasks")} />
                  <StatCard icon="₪" title="סך מכירות בתאריך" value={`₪${metrics.salesByDate.toLocaleString("he-IL")}`} subtitle={formatDate(salesDateFilter)} onClick={()=>navigateTo("reports")} />
                </section>

                <div className="grid gap-6 xl:grid-cols-[1.15fr_0.85fr]">
                  <Card className="p-5">
                    <div className="mb-4 flex justify-between gap-3">
                      <div><h3 className="text-xl font-extrabold">ביצועים לפי עובד</h3><p className="text-sm text-slate-500">לחיצה על עובד תפתח את תיקי הלקוחות והמשימות שלו.</p></div>
                      <span className="status bg-slate-100 text-slate-600">Team Performance</span>
                    </div>
                    <div className="grid gap-3 md:grid-cols-2">
                      {workerStats.map(worker => (
                        <button key={worker.id} onClick={()=>openWorkerPanel(worker.id,"clients")} className="clickable rounded-3xl bg-slate-50 p-4 text-right">
                          <div className="flex justify-between gap-3">
                            <div><p className="font-extrabold">{worker.name}</p><p className="text-sm text-slate-500">{worker.role}</p></div>
                            <p className="font-extrabold">₪{worker.revenue.toLocaleString("he-IL")}</p>
                          </div>
                          <p className="mt-2 text-xs text-slate-500">{worker.clientsTotal} לידים · {worker.openTasks} משימות פתוחות · {worker.inProgressTasks} בטיפול · {worker.completedTasks} הושלמו</p>
                          <div className="mt-3 h-2 rounded-full bg-slate-200 overflow-hidden"><div className="h-full rounded-full bg-blue-400" style={{width:`${Math.min(100, Math.max(8, worker.clientsTotal*12 + worker.completedTasks*8))}%`}}></div></div>
                        </button>
                      ))}
                    </div>
                  </Card>

                  <Card className="p-5">
                    <div className="mb-4 flex justify-between gap-3">
                      <div><h3 className="text-xl font-extrabold">מצב לידים כללי</h3><p className="text-sm text-slate-500">כל סטטוס לחיץ ומוביל לרשימה הרלוונטית.</p></div>
                      <span className="status bg-slate-100 text-slate-600">Overview</span>
                    </div>
                    <div className="grid gap-3">
                      {statusStats.map(item => {
                        const width = visibleClients.length ? Math.max(6, Math.round((item.count / visibleClients.length)*100)) : 6;
                        return <button key={item.status} onClick={()=>{setStatusFilter(item.status); navigateTo("clients")}} className="clickable rounded-2xl bg-slate-50 p-3 text-right">
                          <div className="flex justify-between"><b>{item.status}</b><span>{item.count}</span></div>
                          <div className="mt-2 h-2 rounded-full bg-slate-200 overflow-hidden"><div className="h-full rounded-full bg-blue-400" style={{width:`${width}%`}}></div></div>
                        </button>
                      })}
                    </div>
                    <div className="mt-5 grid gap-3 sm:grid-cols-3">
                      <button onClick={()=>navigateTo("clients")} className="clickable rounded-2xl bg-slate-50 p-4 text-right"><p className="text-xs text-slate-500">לידים פתוחים</p><p className="text-2xl font-extrabold">{visibleClients.filter(c=>!["נסגר / נמכר","לא רלוונטי"].includes(c.status)).length}</p></button>
                      <button onClick={()=>navigateTo("tasks")} className="clickable rounded-2xl bg-slate-50 p-4 text-right"><p className="text-xs text-slate-500">משימות פתוחות</p><p className="text-2xl font-extrabold">{flatTasks.filter(t=>t.status!=="משימה הושלמה").length}</p></button>
                      <button onClick={()=>bestWorker && openWorkerPanel(bestWorker.id,"clients")} className="clickable rounded-2xl bg-slate-50 p-4 text-right"><p className="text-xs text-slate-500">עובד בולט</p><p className="text-xl font-extrabold">{bestWorker?.name || "—"}</p></button>
                    </div>
                  </Card>
                </div>
              </div>
            )}

            {activeScreen === "home" && (
              <div className="space-y-6">
                <Card className="p-5">
                  <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
                    <div><h3 className="text-xl font-extrabold">סיכום מכירות אישי</h3><p className="text-sm text-slate-500">מכירות היום ופילטור לפי תאריך.</p></div>
                    <div className="md:w-72"><Input type="date" value={salesDateFilter} onChange={e=>setSalesDateFilter(e.target.value)} /><p className="mt-2 text-sm font-bold">מכירות בתאריך: ₪{metrics.salesByDate.toLocaleString("he-IL")}</p></div>
                  </div>

                    <div className="mb-4 flex justify-between gap-3"><div><h3 className="text-xl font-extrabold">לקוחות אחרונים</h3><p className="text-sm text-slate-500">לחיצה על לקוח פותחת תיק מלא.</p></div><Button variant="ghost" onClick={()=>navigateTo("clients")}>פתיחת טבלה</Button></div>

                  </Card>

            {activeScreen === "clients" && (

                  </Card>

                      <Select value={statusFilter} onChange={e=>setStatusFilter(e.target.value)}><option>הכל</option>{clientStatuses.map(s=><option key={s}>{s}</option>)}</Select>
                      <Select value={ownerFilter} disabled={!isManager} onChange={e=>setOwnerFilter(e.target.value)}><option value="הכל">כל העובדים</option>{clientEnabledWorkers().map(w=><option key={w.id} value={w.id}>{w.name}</option>)}</Select>

                        <tbody>

                            <tr key={c.id} className="border-t border-slate-100">

                </section>

                <section className="xl:sticky xl:top-8 xl:h-fit">

                <div className="space-y-3">

                    <div key={task.id} className="rounded-3xl bg-slate-50 p-4">

                        <div className="grid gap-2 md:w-44"><Select value={task.status} onChange={e=>updateClientTask(task.clientId, task.id, {status:e.target.value})}>{taskStatuses.map(s=><option key={s}>{s}</option>)}</Select>{task.clientId ? <Button variant="ghost" onClick={()=>openClient(task.clientId)}>תיק לקוח</Button> : <span className="rounded-2xl bg-slate-100 px-4 py-2 text-center text-xs text-slate-500">ללא תיק לקוח</span>}</div>
                      </div>
                    </div>
                  ))}
                  {visibleTasks.length === 0 && <EmptyState title="אין משימות" subtitle="אפשר ליצור משימה מתוך תיק לקוח או כרטיס עובד." />}
                </div>
              </Card>
            )}

            {activeScreen === "reports" && (
              <div className="space-y-6">
                <Card className="p-5">
                  <div className="flex flex-col gap-4 md:flex-row md:items-center md:justify-between"><div><h3 className="text-xl font-extrabold">פילטור דוח מכירות לפי תאריך</h3><p className="text-sm text-slate-500">הדוח והמדדים מתעדכנים לפי התאריך שנבחר.</p></div><div className="md:w-72"><Input type="date" value={salesDateFilter} onChange={e=>setSalesDateFilter(e.target.value)} /><p className="mt-2 text-sm font-bold">₪{metrics.salesByDate.toLocaleString("he-IL")} · {metrics.closedByDate} סגירות</p></div></div>
                </Card>
                <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
                  <StatCard icon="₪" title="מכירות היום" value={`₪${metrics.salesToday.toLocaleString("he-IL")}`} />
                  <StatCard icon="₪" title="מכירות בתאריך" value={`₪${metrics.salesByDate.toLocaleString("he-IL")}`} subtitle={formatDate(salesDateFilter)} />
                  <StatCard icon="▤" title="תיקי לקוחות" value={metrics.clientsTotal} />
                  <StatCard icon="✓" title="משימות פתוחות" value={metrics.openTasks} onClick={()=>navigateTo("tasks")} />
                  <StatCard icon="◌" title="דיווחים" value={metrics.reportsTotal} />
                </section>
                <Card className="p-5">
                  <div className="mb-4 flex items-center justify-between gap-3"><div><h3 className="text-xl font-extrabold">דוחות ודיווחים על המסך</h3><p className="text-sm text-slate-500">כולל לקוחות, משימות ודיווחי משתמשים.</p></div><Button onClick={downloadExcel}>הורדה לאקסל</Button></div>
                  <div className="grid gap-6 xl:grid-cols-2">
                    <div><h4 className="mb-3 font-bold">דיווחים אחרונים</h4><div className="space-y-2">{visibleReports.map(r=><button key={r.id} onClick={()=>openClient(r.clientId)} className="clickable w-full rounded-2xl bg-slate-50 p-3 text-right"><p className="font-bold">{r.clientName} · {getWorkerName(r.userId)}</p><p className="text-sm text-slate-600">{r.text}</p><p className="text-xs text-slate-400">{formatDate(r.date)}</p></button>)}{visibleReports.length===0 && <p className="text-sm text-slate-500">אין דיווחים להצגה.</p>}</div></div>
                    <div><h4 className="mb-3 font-bold">דוח עובדים</h4><div className="space-y-2">{workerStats.map(w=><button key={w.id} onClick={()=>openWorkerPanel(w.id,"clients")} className="clickable w-full rounded-2xl bg-slate-50 p-3 text-right"><div className="flex justify-between gap-3"><div><p className="font-bold">{w.name}</p><p className="text-xs text-slate-500">{w.clientsTotal} לקוחות · {w.openTasks} משימות פתוחות · {w.reportsTotal} דיווחים</p></div><p className="font-bold">₪{w.revenue.toLocaleString("he-IL")}</p></div></button>)}</div></div>
                  </div>
                </Card>
              </div>
            )}

            {activeScreen === "manager" && isManager && (
              <div className="space-y-6">
                <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-5">
                  <StatCard icon="₪" title="מכירות היום - כולם" value={`₪${metrics.salesToday.toLocaleString("he-IL")}`} />
                  <StatCard icon="₪" title="מכירות בתאריך - כולם" value={`₪${metrics.salesByDate.toLocaleString("he-IL")}`} subtitle={formatDate(salesDateFilter)} />
                  <StatCard icon="▤" title="תיקי לקוחות - כולם" value={clients.length} />
                  <StatCard icon="✓" title="משימות פתוחות - כולם" value={flatTasks.filter(t=>t.status!=="משימה הושלמה").length} onClick={()=>navigateTo("tasks")} />
                  <StatCard icon="◌" title="דיווחים - כולם" value={reports.length} />
                </section>
                <Card className="p-5"><h3 className="mb-4 text-xl font-extrabold">שליטת מנהל לידים · משימות עובדים</h3><div className="grid gap-3 md:grid-cols-2 xl:grid-cols-3">{workerStats.map(w=><button key={w.id} onClick={()=>openWorkerPanel(w.id,"clients")} className="clickable rounded-3xl bg-slate-50 p-4 text-right"><p className="font-extrabold">{w.name}</p><p className="text-xs text-slate-500">{w.role}</p><div className="mt-4 grid gap-1 text-sm"><div className="flex justify-between"><span>לקוחות</span><b>{w.clientsTotal}</b></div><div className="flex justify-between"><span>משימות פתוחות</span><b>{w.openTasks}</b></div><div className="flex justify-between"><span>הושלמו</span><b>{w.completedTasks}</b></div><div className="flex justify-between"><span>דיווחים</span><b>{w.reportsTotal}</b></div><div className="flex justify-between"><span>מכירות</span><b>₪{w.revenue.toLocaleString("he-IL")}</b></div></div></button>)}</div></Card>
              </div>
            )}

            {selectedWorkerPanel && (
              <WorkerModal
                selectedWorkerPanel={selectedWorkerPanel}
                selectedWorkerIsTaskOnly={selectedWorkerIsTaskOnly}
                workerPanelClient={workerPanelClient}
                workerPanelClients={workerPanelClients}
                workerPanelTasks={workerPanelTasks}
                displayedWorkerPanelTasks={displayedWorkerPanelTasks}
                workerPanelStats={workerPanelStats}
                workerPanelTab={workerPanelTab}
                setWorkerPanelTab={setWorkerPanelTab}
                setSelectedWorkerPanelId={setSelectedWorkerPanelId}
                setWorkerPanelClientId={setWorkerPanelClientId}
                workerTaskStatusFilter={workerTaskStatusFilter}
                setWorkerTaskStatusFilter={setWorkerTaskStatusFilter}
                openClientInsideWorkerPanel={setWorkerPanelClientId}
                sendWhatsAppToClient={sendWhatsAppToClient}
                newAction={newAction}
                setNewAction={setNewAction}
                addActionToClient={addActionToClient}
                newReport={newReport}
                setNewReport={setNewReport}
                addReportToClient={addReportToClient}
                renderClientTasks={renderClientTasks}
                updateClientField={updateClientField}
                setClient={setClient}
                workerNewClient={workerNewClient}
                setWorkerNewClient={setWorkerNewClient}
                addClientToWorker={() => {
                  if(!workerNewClient.fullName.trim() || !workerNewClient.phone.trim()) return;
                  const c = {id:"C-"+Date.now(), fullName:workerNewClient.fullName, phone:workerNewClient.phone, email:workerNewClient.email, city:workerNewClient.city, product:workerNewClient.product || "לא צוין", source:"הקלדה בכרטיס עובד", status:"חדש", ownerId:selectedWorkerPanel.id, createdAt:today, followUpAt:today, saleAmount:0, lastAction:"לקוח נוסף דרך עובד", actions:[], reports:[], tasks:[]};
                  setClients(prev => [c, ...prev]); setWorkerNewClient({fullName:"",phone:"",email:"",city:"",product:""});
                }}
                workerBulkText={workerBulkText}
                setWorkerBulkText={setWorkerBulkText}
                loadBulkClientsToWorker={() => loadBulkClients(selectedWorkerPanel.id, workerBulkText)}
                workerTaskDraft={workerTaskDraft}
                setWorkerTaskDraft={setWorkerTaskDraft}
                addWorkerTask={addWorkerTask}
                updateClientTask={updateClientTask}
              />
            )}
          </div>
        </main>
      </div>
    </div>
  )
}

function ClientFile({client, sendWhatsAppToClient, newAction, setNewAction, addActionToClient, newReport, setNewReport, addReportToClient, newClientTask, setNewClientTask, addTaskToClient, renderClientTasks}){
  if(!client) return <EmptyState title="בחרי לקוח" subtitle="תיק הלקוח יופיע כאן." />
  return (
    <Card className="p-5">
      <div className="space-y-5">
        <div className="flex justify-between gap-4">
          <div><h3 className="text-2xl font-extrabold">{client.fullName}</h3><p className="text-sm text-slate-500">{client.phone} · {client.email || "ללא אימייל"}</p></div>
          <Pill status={client.status}>{client.status}</Pill>
        </div>
        <div className="grid gap-3 rounded-3xl bg-slate-50 p-4 text-sm md:grid-cols-2">
          <div><span className="text-slate-500">עיר:</span> <b>{client.city}</b></div>
          <div><span className="text-slate-500">מוצר:</span> <b>{client.product}</b></div>
          <div><span className="text-slate-500">עובד מטפל:</span> <b>{getWorkerName(client.ownerId)}</b></div>
          <div><span className="text-slate-500">מכירה:</span> <b>₪{Number(client.saleAmount||0).toLocaleString("he-IL")}</b></div>
        </div>
        <div className="flex flex-wrap gap-2 rounded-3xl bg-slate-50 p-3"><Button onClick={()=>sendWhatsAppToClient(client)}>פתיחת WhatsApp</Button><p className="flex items-center text-xs text-slate-500">פותח את WhatsApp בלבד, ללא הודעה מוכנה.</p></div>
        <div>
          <h4 className="mb-2 font-bold">תפריט משימות לעובדים</h4>
          <div className="grid gap-3 md:grid-cols-[1fr_1fr_150px]">
            <Select value={newClientTask.type} onChange={e=>setNewClientTask({...newClientTask,type:e.target.value})}>{clientTaskTypes.map(t=><option key={t}>{t}</option>)}</Select>
            <Select value={newClientTask.ownerId || client.ownerId} onChange={e=>setNewClientTask({...newClientTask,ownerId:e.target.value})}>{workers.filter(w=>!w.isManager).map(w=><option key={w.id} value={w.id}>{w.name} · {w.role}{w.taskOnly ? " · משימות בלבד" : ""}</option>)}</Select>
            <Input type="date" value={newClientTask.dueDate} onChange={e=>setNewClientTask({...newClientTask,dueDate:e.target.value})} />
          </div>
          <Input value={newClientTask.note} onChange={e=>setNewClientTask({...newClientTask,note:e.target.value})} placeholder="הערה למשימה" className="mt-2" />
          <Button className="mt-2" onClick={()=>addTaskToClient(client)}>הוספת משימה לעובד</Button>
          <div className="mt-3">{renderClientTasks(client)}</div>
        </div>
        <div>
          <h4 className="mb-2 font-bold">היסטוריית פעולות מול הלקוח</h4>
          <Textarea value={newAction} onChange={e=>setNewAction(e.target.value)} placeholder="מה קרה בשיחה? מה סוכם? האם נשלחה הצעת מחיר?" />
          <Button variant="ghost" className="mt-2" onClick={()=>addActionToClient(client)}>שמירת פעולה</Button>
          <div className="mt-3 max-h-56 space-y-2 overflow-auto rounded-3xl bg-slate-50 p-3">
            {client.actions.map(a=><div key={a.id} className="rounded-2xl bg-white p-3 text-sm shadow-sm"><p className="font-bold">{a.type} · {getWorkerName(a.userId)}</p><p className="text-slate-600">{a.text}</p><p className="text-xs text-slate-400">{formatDate(a.date)}</p></div>)}
            {client.actions.length===0 && <p className="text-sm text-slate-500">אין פעולות עדיין.</p>}
          </div>
        </div>
        <div>
          <h4 className="mb-2 font-bold">דיווח משתמש על פעולות שנעשו</h4>
          <Textarea value={newReport} onChange={e=>setNewReport(e.target.value)} placeholder="דיווח פנימי למנהל/ת..." />
          <Button variant="ghost" className="mt-2" onClick={()=>addReportToClient(client)}>שמירת דיווח</Button>
          <div className="mt-3 max-h-44 space-y-2 overflow-auto rounded-3xl bg-slate-50 p-3">
            {client.reports.map(r=><div key={r.id} className="rounded-2xl bg-white p-3 text-sm shadow-sm"><p className="font-bold">{getWorkerName(r.userId)} · {formatDate(r.date)}</p><p className="text-slate-600">{r.text}</p></div>)}
            {client.reports.length===0 && <p className="text-sm text-slate-500">אין דיווחים עדיין.</p>}
          </div>
        </div>
      </div>
    </Card>
  )
}

function WorkerModal(props){
  const {
    selectedWorkerPanel, selectedWorkerIsTaskOnly, workerPanelClient, workerPanelClients, workerPanelTasks,
    displayedWorkerPanelTasks, workerPanelStats, workerPanelTab, setWorkerPanelTab, setSelectedWorkerPanelId, setWorkerPanelClientId,
    workerTaskStatusFilter, setWorkerTaskStatusFilter, openClientInsideWorkerPanel, sendWhatsAppToClient,
    newAction, setNewAction, addActionToClient, newReport, setNewReport, addReportToClient, renderClientTasks,
    updateClientField, setClient, workerNewClient, setWorkerNewClient, addClientToWorker, workerBulkText, setWorkerBulkText,
    loadBulkClientsToWorker, workerTaskDraft, setWorkerTaskDraft, addWorkerTask, updateClientTask
  } = props;

  const close = () => { setSelectedWorkerPanelId(""); setWorkerPanelClientId(""); };
  const back = () => setWorkerPanelClientId("");

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/45 p-4" onClick={close}>
      <div className="modal-box modal-scroll w-full max-w-6xl rounded-[2rem] bg-white p-5 shadow-2xl" onClick={e=>e.stopPropagation()}>
        <div className="mb-5 flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
          <div>
            <h3 className="text-3xl font-extrabold">{workerPanelClient ? workerPanelClient.fullName : selectedWorkerPanel.name}</h3>
            <p className="mt-1 text-sm text-slate-500">{workerPanelClient ? `תיק לקוח מתוך כרטיס העובד · ${selectedWorkerPanel.name}` : `${selectedWorkerPanel.role} · ${selectedWorkerIsTaskOnly ? "משימות בלבד" : `${workerPanelClients.length} לקוחות`} · ${workerPanelTasks.length} משימות עובדים`}</p>
          </div>
          <div className="flex flex-wrap gap-2">
            {workerPanelClient && <Button onClick={back}>חזרה לעובד</Button>}
            {!workerPanelClient && !selectedWorkerIsTaskOnly && <Button variant={workerPanelTab==="clients" ? "primary" : "ghost"} onClick={()=>setWorkerPanelTab("clients")}>לידים של העובד</Button>}
            {!workerPanelClient && <Button variant={workerPanelTab==="tasks" ? "primary" : "ghost"} onClick={()=>{setWorkerPanelTab("tasks");setWorkerTaskStatusFilter("הכל")}}>משימות של העובד</Button>}
            {!workerPanelClient && !selectedWorkerIsTaskOnly && <Button variant={workerPanelTab==="load" ? "primary" : "ghost"} onClick={()=>setWorkerPanelTab("load")}>טעינת טבלת לקוחות</Button>}
            <Button variant="ghost" onClick={close}>סגירה</Button>
          </div>
        </div>

        {workerPanelClient ? (
          <div className="grid gap-5 xl:grid-cols-[0.9fr_1.1fr]">
            <Card className="p-5">
              <div className="space-y-4">
                <div className="flex justify-between gap-4"><div><p className="text-sm font-bold text-slate-500">תיק לקוח מתוך כרטיס העובד</p><h4 className="text-2xl font-extrabold">{workerPanelClient.fullName}</h4><p className="text-sm text-slate-500">{workerPanelClient.phone}</p></div><Pill status={workerPanelClient.status}>{workerPanelClient.status}</Pill></div>
                <div className="grid gap-3 rounded-3xl bg-white p-4 text-sm md:grid-cols-2"><div><span className="text-slate-500">מוצר:</span> <b>{workerPanelClient.product}</b></div><div><span className="text-slate-500">עיר:</span> <b>{workerPanelClient.city}</b></div><div><span className="text-slate-500">עובד מטפל:</span> <b>{getWorkerName(workerPanelClient.ownerId)}</b></div><div><span className="text-slate-500">מכירה:</span> <b>₪{Number(workerPanelClient.saleAmount||0).toLocaleString("he-IL")}</b></div></div>
                <div className="flex flex-wrap gap-2 rounded-3xl bg-white p-3"><Button onClick={()=>sendWhatsAppToClient(workerPanelClient)}>פתיחת WhatsApp</Button><Button variant="ghost" onClick={back}>חזרה לכרטיס עובד</Button><p className="text-xs text-slate-500 flex items-center">פותח את WhatsApp בלבד, ללא הודעה מוכנה.</p></div>
                <div><h5 className="mb-2 font-bold">הוספת פעולה / סיכום שיחה</h5><Textarea value={newAction} onChange={e=>setNewAction(e.target.value)} placeholder="מה קרה בשיחה? מה סוכם? האם צריך המשך טיפול?" /><Button variant="ghost" className="mt-2" onClick={()=>addActionToClient(workerPanelClient)}>שמירת פעולה בהיסטוריה</Button></div>
                <div><h5 className="mb-2 font-bold">דיווח פנימי</h5><Textarea value={newReport} onChange={e=>setNewReport(e.target.value)} placeholder="דיווח פנימי למנהל/ת" /><Button variant="ghost" className="mt-2" onClick={()=>addReportToClient(workerPanelClient)}>שמירת דיווח</Button></div>
              </div>
            </Card>
            <Card className="p-5">
              <div className="space-y-5">
                <div><h4 className="text-2xl font-extrabold">היסטוריית לקוח</h4><p className="text-sm text-slate-500">כל שיחה, WhatsApp, הצעת מחיר, סיכום ומשימה נשמרים כאן לפי תאריך.</p></div>
                <div className="grid gap-3 rounded-3xl bg-white p-4 md:grid-cols-3"><div><p className="text-xs text-slate-500">תאריך פתיחה</p><p className="font-bold">{formatDate(workerPanelClient.createdAt)}</p></div><div><p className="text-xs text-slate-500">Follow-up</p><p className="font-bold">{formatDate(workerPanelClient.followUpAt)}</p></div><div><p className="text-xs text-slate-500">פעולה אחרונה</p><p className="font-bold">{workerPanelClient.lastAction}</p></div></div>
                <div className="grid gap-5 lg:grid-cols-2">
                  <div><h5 className="mb-3 font-bold">Timeline פעולות</h5><div className="max-h-80 space-y-2 overflow-auto rounded-3xl bg-white p-3">{workerPanelClient.actions.map(a=><div key={a.id} className="rounded-2xl bg-slate-50 p-3 text-sm shadow-sm"><p className="font-bold">{a.type} · {getWorkerName(a.userId)}</p><p className="text-slate-600">{a.text}</p><p className="text-xs text-slate-400">{formatDate(a.date)}</p></div>)}{workerPanelClient.actions.length===0 && <p className="text-sm text-slate-500">אין פעולות עדיין.</p>}</div></div>
                  <div><h5 className="mb-3 font-bold">דיווחים ומשימות</h5><div className="space-y-3"><div className="rounded-3xl bg-white p-3"><p className="mb-2 text-sm font-bold">משימות על הלקוח</p>{renderClientTasks(workerPanelClient)}</div><div className="max-h-56 space-y-2 overflow-auto rounded-3xl bg-white p-3">{workerPanelClient.reports.map(r=><div key={r.id} className="rounded-2xl bg-slate-50 p-3 text-sm shadow-sm"><p className="font-bold">{getWorkerName(r.userId)} · {formatDate(r.date)}</p><p className="text-slate-600">{r.text}</p></div>)}{workerPanelClient.reports.length===0 && <p className="text-sm text-slate-500">אין דיווחים עדיין.</p>}</div></div></div>
                </div>
              </div>
            </Card>
          </div>
        ) : (
          <div className="space-y-5">
            <section className="grid gap-4 sm:grid-cols-2 xl:grid-cols-4">
              {!selectedWorkerIsTaskOnly && <StatCard icon="▤" title="לידים" value={workerPanelClients.length} subtitle="לקוחות משויכים לעובד" onClick={()=>setWorkerPanelTab("clients")} />}
              <StatCard icon="✓" title="משימות פתוחות" value={workerPanelStats?.openTasks || 0} subtitle="לחיצה תציג פתוחות" onClick={()=>{setWorkerPanelTab("tasks");setWorkerTaskStatusFilter("פתוחות")}} />
              <StatCard icon="✓" title="הושלמו" value={workerPanelStats?.completedTasks || 0} subtitle="לחיצה תציג הושלמו" onClick={()=>{setWorkerPanelTab("tasks");setWorkerTaskStatusFilter("משימה הושלמה")}} />
              {!selectedWorkerIsTaskOnly && <StatCard icon="₪" title="מכירות בתאריך" value={`₪${Number(workerPanelStats?.salesByDate||0).toLocaleString("he-IL")}`} subtitle={formatDate(today)} onClick={()=>setWorkerPanelTab("clients")} />}
            </section>

            {workerPanelTab === "clients" && !selectedWorkerIsTaskOnly && (
              <div className="grid gap-5 xl:grid-cols-[1fr_0.8fr]">
                <Card className="p-5">
                  <div className="mb-4 flex justify-between gap-3"><div><h4 className="text-xl font-extrabold">טבלת לקוחות של {selectedWorkerPanel.name}</h4><p className="text-sm text-slate-500">אפשר לערוך או לפתוח תיק לקוח מלא.</p></div><Button onClick={()=>setWorkerPanelTab("load")}>+ טעינה / הוספה</Button></div>
                  <div className="table-wrap">
                    <table className="w-full min-w-[760px] text-sm"><thead className="bg-slate-50 text-slate-500"><tr>{["שם","טלפון","מוצר","סטטוס","מכירה","פתיחה"].map(h=><th key={h} className="p-3 text-right">{h}</th>)}</tr></thead><tbody>{workerPanelClients.map(c=><tr key={c.id} className="border-t border-slate-100"><td className="p-2"><Input value={c.fullName} onChange={e=>updateClientField(c.id,"fullName",e.target.value)} /></td><td className="p-2"><Input value={c.phone} onChange={e=>updateClientField(c.id,"phone",e.target.value)} /></td><td className="p-2"><Input value={c.product} onChange={e=>updateClientField(c.id,"product",e.target.value)} /></td><td className="p-2"><Select value={c.status} onChange={e=>setClient(c.id,{status:e.target.value, saleDate:e.target.value==="נסגר / נמכר" ? today : c.saleDate, lastAction:`סטטוס עודכן ל-${e.target.value}`})}>{clientStatuses.map(s=><option key={s}>{s}</option>)}</Select></td><td className="p-2"><Input type="number" value={c.saleAmount} onChange={e=>updateClientField(c.id,"saleAmount",Number(e.target.value))} /></td><td className="p-2"><Button onClick={()=>openClientInsideWorkerPanel(c.id)}>תיק לקוח</Button></td></tr>)}</tbody></table>
                    {workerPanelClients.length===0 && <div className="p-6 text-center text-sm text-slate-500">אין לקוחות לעובד הזה עדיין.</div>}
                  </div>
                </Card>
                <Card className="p-5"><h4 className="mb-3 text-xl font-extrabold">הוספת לקוח לעובד</h4><div className="grid gap-3"><Input value={workerNewClient.fullName} onChange={e=>setWorkerNewClient({...workerNewClient,fullName:e.target.value})} placeholder="שם מלא" /><Input value={workerNewClient.phone} onChange={e=>setWorkerNewClient({...workerNewClient,phone:e.target.value})} placeholder="טלפון" /><Input value={workerNewClient.city} onChange={e=>setWorkerNewClient({...workerNewClient,city:e.target.value})} placeholder="עיר / אזור" /><Input value={workerNewClient.email} onChange={e=>setWorkerNewClient({...workerNewClient,email:e.target.value})} placeholder="אימייל" /><Input value={workerNewClient.product} onChange={e=>setWorkerNewClient({...workerNewClient,product:e.target.value})} placeholder="מוצר / שירות" /><Button onClick={addClientToWorker}>הוספת לקוח לעובד</Button></div></Card>
              </div>
            )}

            {workerPanelTab === "tasks" && (
              <div className="grid gap-5 xl:grid-cols-[1fr_0.8fr]">
                <Card className="p-5">
                  <div className="mb-4 flex flex-col gap-3 md:flex-row md:items-center md:justify-between"><div><h4 className="text-xl font-extrabold">משימות של {selectedWorkerPanel.name}</h4><p className="text-sm text-slate-500">סינון לפי סטטוס.</p></div><div className="flex flex-wrap gap-2">{["הכל","פתוחות","פתוחה","משימה בטיפול","משימה הושלמה"].map(f=><Button key={f} variant={workerTaskStatusFilter===f ? "primary" : "ghost"} className="text-xs" onClick={()=>setWorkerTaskStatusFilter(f)}>{f}</Button>)}</div></div>
                  <div className="space-y-3">{displayedWorkerPanelTasks.map(task=><div key={task.id} className="rounded-3xl bg-white p-4 shadow-sm"><div className="flex flex-col gap-3 md:flex-row md:items-start md:justify-between"><div><p className="font-extrabold">{task.clientId ? task.clientName : "משימה פנימית"}</p><p className="mt-1 text-sm text-slate-700">{task.type}</p><p className="mt-1 text-xs text-slate-500">יעד: {formatDate(task.dueDate)}</p>{task.note && <p className="mt-2 text-sm text-slate-600">{task.note}</p>}</div><div className="grid gap-2 md:w-48"><Select value={task.status} onChange={e=>updateClientTask(task.clientId, task.id, {status:e.target.value})}>{taskStatuses.map(s=><option key={s}>{s}</option>)}</Select>{task.clientId ? <Button onClick={()=>openClientInsideWorkerPanel(task.clientId)}>תיק לקוח</Button> : <span className="rounded-2xl bg-slate-100 px-4 py-2 text-center text-xs text-slate-500">ללא תיק לקוח</span>}</div></div></div>)}{displayedWorkerPanelTasks.length===0 && <EmptyState title="אין משימות להצגה" subtitle="אפשר לשנות סינון או להוסיף משימה חדשה." />}</div>
                </Card>
                <Card className="p-5"><h4 className="mb-3 text-xl font-extrabold">{selectedWorkerIsTaskOnly ? "הוספת משימה רגילה לעובד" : "הוספת משימה לעובד"}</h4><p className="mb-3 text-sm text-slate-500">{selectedWorkerIsTaskOnly ? "לעובד זה אין לקוחות. המשימות כאן הן משימות פנימיות רגילות בלבד." : "אפשר לקשר משימה ללקוח או להשאיר ללא לקוח."}</p><div className="grid gap-3">{!selectedWorkerIsTaskOnly && <Select value={workerTaskDraft.clientId} onChange={e=>setWorkerTaskDraft({...workerTaskDraft,clientId:e.target.value})}><option value="">ללא לקוח מקושר</option>{workerPanelClients.map(c=><option key={c.id} value={c.id}>{c.fullName}</option>)}</Select>}<Select value={workerTaskDraft.type} onChange={e=>setWorkerTaskDraft({...workerTaskDraft,type:e.target.value})}>{(selectedWorkerIsTaskOnly ? employeeTaskTypes : clientTaskTypes).map(t=><option key={t}>{t}</option>)}</Select><Input type="date" value={workerTaskDraft.dueDate} onChange={e=>setWorkerTaskDraft({...workerTaskDraft,dueDate:e.target.value})} /><Input value={workerTaskDraft.note} onChange={e=>setWorkerTaskDraft({...workerTaskDraft,note:e.target.value})} placeholder="הערה למשימה" /><Button onClick={addWorkerTask}>הוספת משימה</Button></div></Card>
              </div>
            )}

            {workerPanelTab === "load" && !selectedWorkerIsTaskOnly && (
              <Card className="p-5"><h4 className="text-xl font-extrabold">טעינת טבלת לקוחות עבור {selectedWorkerPanel.name}</h4><p className="text-sm text-slate-500">כל שורה: שם, טלפון, עיר, אימייל, מוצר.</p><Textarea value={workerBulkText} onChange={e=>setWorkerBulkText(e.target.value)} placeholder="ישראל ישראלי,0500000000,תל אביב,email@test.com,ייעוץ" className="mt-4 min-h-48" /><div className="mt-4 flex flex-wrap gap-2"><Button onClick={loadBulkClientsToWorker}>טעינת לקוחות לעובד</Button><Button variant="ghost" onClick={()=>setWorkerPanelTab("clients")}>חזרה לטבלת לקוחות</Button></div></Card>
            )}
          </div>
        )}
      </div>
    </div>
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
