<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ניהול לידים ומכירות</title>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --dark: #020617;
      --soft: #f1f5f9;
      --green: #059669;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    button, input, textarea, select { font: inherit; }
    button { cursor: pointer; }
    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .sidebar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 16px;
    }
    .brand {
      background: var(--dark);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .brand small { color: #cbd5e1; }
    .brand h1 { margin: 6px 0; font-size: 24px; }
    .brand p { margin: 0; color: #cbd5e1; font-size: 14px; }
    .nav {
      display: grid;
      gap: 8px;
    }
    .nav button {
      width: 100%;
      border: 0;
      background: transparent;
      color: var(--muted);
      padding: 12px 14px;
      border-radius: 16px;
      text-align: right;
      font-weight: 700;
    }
    .nav button.active {
      background: var(--dark);
      color: white;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.12);
    }
    .main {
      flex: 1;
      padding: 16px;
    }
    .container {
      max-width: 1280px;
      margin: 0 auto;
    }
    header {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }
    header small {
      color: var(--muted);
      font-weight: 700;
    }
    header h2 {
      margin: 4px 0 0;
      font-size: 30px;
    }
    .card {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      padding: 20px;
    }
    .grid {
      display: grid;
      gap: 16px;
    }
    .stats {
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }
    .two {
      grid-template-columns: 1fr;
    }
    .stat {
      background: var(--card);
      border-radius: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
      padding: 18px;
    }
    .stat .label { color: var(--muted); font-size: 14px; }
    .stat .value { font-size: 30px; font-weight: 800; margin-top: 8px; }
    .stat .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
    .btn {
      border: 0;
      background: var(--dark);
      color: white;
      padding: 10px 16px;
      border-radius: 16px;
      font-weight: 700;
    }
    .btn.secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn.green {
      background: var(--green);
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--border);
      background: white;
      border-radius: 16px;
      padding: 10px 12px;
      outline: none;
    }
    textarea { min-height: 90px; resize: vertical; }
    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr;
    }
    .filters {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .lead-list, .task-list, .worker-list {
      display: grid;
      gap: 10px;
    }
    .lead-row, .task-row, .worker-row {
      border: 1px solid var(--border);
      background: white;
      border-radius: 22px;
      padding: 14px;
      text-align: right;
    }
    .lead-row.selected {
      border-color: var(--dark);
      box-shadow: 0 1px 4px rgba(15,23,42,0.12);
    }
    .row-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-weight: 800;
    }
    .row-meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 6px;
      line-height: 1.7;
    }
    .pill {
      display: inline-flex;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid var(--border);
      background: var(--soft);
      color: var(--muted);
    }
    .pill.new { background: #eff6ff; color: #1d4ed8; border-color: #dbeafe; }
    .pill.work { background: #fffbeb; color: #b45309; border-color: #fef3c7; }
    .pill.done { background: #ecfdf5; color: #047857; border-color: #d1fae5; }
    .details {
      position: static;
    }
    .info-grid {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      background: var(--soft);
      border-radius: 22px;
      padding: 14px;
      font-size: 14px;
    }
    .notes {
      max-height: 220px;
      overflow: auto;
      background: var(--soft);
      border-radius: 22px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }
    .note {
      background: white;
      border-radius: 16px;
      padding: 10px;
      font-size: 14px;
      color: #334155;
    }
    .bar {
      height: 12px;
      background: var(--soft);
      border-radius: 999px;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar div {
      height: 100%;
      background: var(--dark);
      border-radius: 999px;
    }
    .screen { display: none; }
    .screen.active { display: block; }
    h3 { margin-top: 0; }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
    }
    label > input, label > select, label > textarea { margin-top: 8px; }
    .actions {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr;
      margin-top: 12px;
    }
    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    @media (min-width: 900px) {
      .app { flex-direction: row; }
      .sidebar {
        width: 288px;
        min-height: 100vh;
        border-bottom: 0;
        border-left: 1px solid var(--border);
        position: sticky;
        top: 0;
        align-self: flex-start;
      }
      .main { padding: 32px; }
      header {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
      }
      .two {
        grid-template-columns: 1fr 1fr;
      }
      .leads-layout {
        grid-template-columns: 1.1fr 0.9fr;
      }
      .details {
        position: sticky;
        top: 32px;
        align-self: start;
      }
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
      .filters {
        grid-template-columns: 1fr 180px 180px;
      }
      .info-grid {
        grid-template-columns: 1fr 1fr;
      }
      .actions {
        grid-template-columns: 1fr 1fr;
      }
      .tasks-layout {
        grid-template-columns: 0.85fr 1.15fr;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <small>MVP דמו</small>
      <h1>ניהול לידים ומכירות</h1>
      <p>טופס לידים + WhatsApp</p>
    </div>
    <nav class="nav">
      <button class="active" data-screen="dashboard">דשבורד מנהלים</button>
      <button data-screen="leads">לידים</button>
      <button data-screen="followups">תזכורות Follow-up</button>
      <button data-screen="tasks">ניהול משימות</button>
      <button data-screen="reports">דוחות</button>
      <button data-screen="team">צוות והרשאות</button>
    </nav>
    <button class="btn secondary" style="width:100%;margin-top:16px" onclick="resetDemo()">איפוס דמו</button>
  </aside>

  <main class="main">
    <div class="container">
      <header>
        <div>
          <small>מערכת פנימית ל־11 עובדים</small>
          <h2 id="screenTitle">דשבורד מנהלים</h2>
        </div>
        <button class="btn" onclick="showScreen('leads')">+ הוספת ליד דמו</button>
      </header>

      <section id="dashboard" class="screen active"></section>
      <section id="leads" class="screen"></section>
      <section id="followups" class="screen"></section>
      <section id="tasks" class="screen"></section>
      <section id="reports" class="screen"></section>
      <section id="team" class="screen"></section>
    </div>
  </main>
</div>

<script>
const statuses = ["חדש", "בטיפול", "לא ענה", "לחזור אליו", "שיחה נקבעה", "נסגר / נמכר", "לא רלוונטי"];
const LEAD_SOURCE = "טופס - דר אירית שחם";
const today = "2026-05-23";

const workers = [
  { id: "w-0", name: "שגיא", active: true, role: "גרפיקה" },
  { id: "w-1", name: "לואיזה", active: true, role: "מכירות" },
  { id: "w-2", name: "דניאל", active: true, role: "מכירות" },
  { id: "w-3", name: "ליהי", active: true, role: "מכירות" },
  { id: "w-4", name: "נלי", active: true, role: "מדריכה ומכירות" },
  { id: "w-5", name: "אורית", active: true, role: "מנהלת משרד ומכירות" },
  { id: "w-6", name: "שילי", active: true, role: "מנהלת שיווק" },
  { id: "w-7", name: "שני", active: true, role: "יוצרת תוכן" },
  { id: "w-8", name: "קרן", active: true, role: "אתרים" },
  { id: "w-9", name: "חוה", active: true, role: "לוגיסטיקה" },
  { id: "w-10", name: "גיירן", active: true, role: "גביה" },
];

const initialLeads = [
  { id:"L-1001", fullName:"לירון כהן", phone:"054-2095258", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-1", createdAt:"2026-05-19", followUpAt:"2026-05-19", notes:["התקבל מהטופס בתאריך 19.05.2026 בשעה 17:18. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1002", fullName:"ורד מויאל", phone:"050-3822203", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-2", createdAt:"2026-05-19", followUpAt:"2026-05-19", notes:["התקבל מהטופס בתאריך 19.05.2026 בשעה 18:54. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1003", fullName:"לימור מלא בן הרוש", phone:"050-9447890", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"פגישת ייעוץ כללית", status:"חדש", ownerId:"w-3", createdAt:"2026-05-19", followUpAt:"2026-05-19", notes:["התקבל מהטופס בתאריך 19.05.2026 בשעה 19:41. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1004", fullName:"גילת לוין", phone:"050-7450967", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-4", createdAt:"2026-05-20", followUpAt:"2026-05-20", notes:["התקבל מהטופס בתאריך 20.05.2026 בשעה 03:54. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1005", fullName:"איילה כהן", phone:"050-6286609", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-5", createdAt:"2026-05-23", followUpAt:"2026-05-23", notes:["התקבל מהטופס בתאריך 23.05.2026 בשעה 02:10. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1006", fullName:"מיכל בידאני", phone:"052-6958897", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-6", createdAt:"2026-05-23", followUpAt:"2026-05-23", notes:["התקבל מהטופס בתאריך 23.05.2026 בשעה 02:11. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1007", fullName:"מיכל מלכה", phone:"054-9987799", email:"", city:"רמת השרון", source:LEAD_SOURCE, product:"טיפולי מרקם עור - פילינגים", status:"חדש", ownerId:"w-7", createdAt:"2026-05-23", followUpAt:"2026-05-23", notes:["התקבל מהטופס בתאריך 23.05.2026 בשעה 04:57. מיקום: כן, רלוונטי מאוד."], lastAction:"ליד חדש מהטופס", saleAmount:0 },
  { id:"L-1008", fullName:"כרמלה", phone:"052-5550912", email:"", city:"רחוק מרמת השרון", source:LEAD_SOURCE, product:"פיסול פנים - nexha mesoestetic", status:"לא רלוונטי", ownerId:"w-8", createdAt:"2026-05-23", followUpAt:"", notes:["התקבל מהטופס בתאריך 23.05.2026 בשעה 10:12. מיקום: לא, רחוק לי מדי."], lastAction:"סומן כלא רלוונטי לפי מיקום", saleAmount:0 },
];

const initialTasks = [
  { id:"T-2001", title:"לחזור ללירון כהן", description:"לתאם שיחה ולהבין איזה טיפול פילינג רלוונטי עבורה.", ownerId:"w-1", relatedLeadId:"L-1001", status:"פתוחה", priority:"גבוהה", dueDate:"2026-05-23", createdAt:"2026-05-23" },
  { id:"T-2002", title:"לשלוח וואטסאפ לורד מויאל", description:"לשלוח הודעת פתיחה עם פרטי הקליניקה ושעות זמינות.", ownerId:"w-2", relatedLeadId:"L-1002", status:"בתהליך", priority:"בינונית", dueDate:"2026-05-23", createdAt:"2026-05-23" },
  { id:"T-2003", title:"להכין גרפיקה לקמפיין פילינגים", description:"ויזואל סטורי וגרסת פיד לקמפיין דר אירית שחם.", ownerId:"w-0", relatedLeadId:"", status:"פתוחה", priority:"בינונית", dueDate:"2026-05-24", createdAt:"2026-05-23" },
  { id:"T-2004", title:"בדיקת מלאי לפני תיאום טיפולים", description:"לוודא זמינות חומרים רלוונטיים לטיפולי מרקם עור.", ownerId:"w-9", relatedLeadId:"", status:"הושלמה", priority:"נמוכה", dueDate:"2026-05-22", createdAt:"2026-05-22" },
];

let leads = load("crm_leads", initialLeads);
let tasks = load("crm_tasks", initialTasks);
let selectedLeadId = leads[0]?.id || "";
let nextWorkerIndex = Number(localStorage.getItem("crm_next_worker_index") || 9);

function load(key, fallback) {
  try {
    const value = localStorage.getItem(key);
    return value ? JSON.parse(value) : structuredClone(fallback);
  } catch {
    return structuredClone(fallback);
  }
}
function save() {
  localStorage.setItem("crm_leads", JSON.stringify(leads));
  localStorage.setItem("crm_tasks", JSON.stringify(tasks));
  localStorage.setItem("crm_next_worker_index", String(nextWorkerIndex));
}
function escapeHtml(text) {
  return String(text ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;" }[m]));
}
function formatDate(dateString) {
  if (!dateString) return "—";
  return new Date(dateString + "T00:00:00").toLocaleDateString("he-IL");
}
function getWorkerName(id) {
  return workers.find(w => w.id === id)?.name || "לא משויך";
}
function getLeadName(id) {
  if (!id) return "ללא ליד מקושר";
  return leads.find(l => l.id === id)?.fullName || "ליד לא נמצא";
}
function pillClass(status) {
  if (status === "חדש") return "pill new";
  if (status === "בטיפול" || status === "בתהליך") return "pill work";
  if (status === "נסגר / נמכר" || status === "הושלמה") return "pill done";
  return "pill";
}
function stat(title, value, sub = "") {
  return `<div class="stat"><div class="label">${title}</div><div class="value">${value}</div>${sub ? `<div class="sub">${sub}</div>` : ""}</div>`;
}
function showScreen(screen) {
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.querySelectorAll(".nav button").forEach(el => el.classList.toggle("active", el.dataset.screen === screen));
  document.getElementById(screen).classList.add("active");
  const titles = { dashboard:"דשבורד מנהלים", leads:"ניהול לידים", followups:"תזכורות Follow-up", tasks:"ניהול משימות", reports:"דוחות מכירות", team:"צוות והרשאות" };
  document.getElementById("screenTitle").textContent = titles[screen];
  render();
}
function metrics() {
  const incomingToday = leads.filter(l => l.createdAt === today).length;
  const closed = leads.filter(l => l.status === "נסגר / נמכר");
  const open = leads.filter(l => !["נסגר / נמכר", "לא רלוונטי"].includes(l.status)).length;
  const dueFollowups = leads.filter(l => l.followUpAt && l.followUpAt <= today && l.status !== "נסגר / נמכר").length;
  const totalSales = closed.reduce((sum, l) => sum + Number(l.saleAmount || 0), 0);
  const conversionRate = leads.length ? Math.round((closed.length / leads.length) * 100) : 0;
  return { incomingToday, closed: closed.length, open, dueFollowups, totalSales, conversionRate };
}
function taskMetrics() {
  const open = tasks.filter(t => t.status !== "הושלמה").length;
  const completed = tasks.filter(t => t.status === "הושלמה").length;
  const overdue = tasks.filter(t => t.status !== "הושלמה" && t.dueDate && t.dueDate < today).length;
  return { open, completed, overdue, total: tasks.length };
}
function workerStats() {
  return workers.map(worker => {
    const workerLeads = leads.filter(l => l.ownerId === worker.id);
    const closed = workerLeads.filter(l => l.status === "נסגר / נמכר");
    const workerTasks = tasks.filter(t => t.ownerId === worker.id);
    return {
      ...worker,
      total: workerLeads.length,
      closed: closed.length,
      tasksOpen: workerTasks.filter(t => t.status !== "הושלמה").length,
      tasksDone: workerTasks.filter(t => t.status === "הושלמה").length,
      revenue: closed.reduce((sum, l) => sum + Number(l.saleAmount || 0), 0),
    };
  });
}
function renderDashboard() {
  const m = metrics();
  const tm = taskMetrics();
  const statusCounts = statuses.map(status => ({ status, count: leads.filter(l => l.status === status).length }));
  document.getElementById("dashboard").innerHTML = `
    <div class="grid stats">
      ${stat("לידים שנכנסו היום", m.incomingToday, "מקור: טופס - דר אירית שחם")}
      ${stat("סגירות", m.closed, `המרה: ${m.conversionRate}%`)}
      ${stat("תזכורות פתוחות", m.dueFollowups, "דורש טיפול היום")}
      ${stat("משימות פתוחות", tm.open, `${tm.completed} הושלמו`)}
      ${stat("סך מכירות", "₪" + m.totalSales.toLocaleString("he-IL"), "לפי עסקאות סגורות")}
    </div>
    <div class="grid two" style="margin-top:20px">
      <div class="card">
        <h3>משפך לפי סטטוס</h3>
        ${statusCounts.map(item => {
          const width = leads.length ? Math.max(8, Math.round((item.count / leads.length) * 100)) : 0;
          return `<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:14px"><b>${item.status}</b><span>${item.count}</span></div><div class="bar"><div style="width:${width}%"></div></div></div>`;
        }).join("")}
      </div>
      <div class="card">
        <h3>ביצועים לפי עובד</h3>
        <div class="worker-list">
          ${workerStats().map(w => `
            <div class="worker-row">
              <div style="display:flex;justify-content:space-between;gap:12px;align-items:center">
                <div>
                  <b>${w.name}</b>
                  <div class="row-meta">${w.total} לידים · ${w.closed} סגירות</div>
                  <div class="row-meta">${w.tasksOpen} משימות פתוחות · ${w.tasksDone} הושלמו</div>
                </div>
                <b>₪${w.revenue.toLocaleString("he-IL")}</b>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
    </div>`;
}
function renderLeads() {
  const selected = leads.find(l => l.id === selectedLeadId) || leads[0];
  selectedLeadId = selected?.id || "";
  const q = document.getElementById("leadSearch")?.value || "";
  const statusFilter = document.getElementById("leadStatusFilter")?.value || "הכל";
  const ownerFilter = document.getElementById("leadOwnerFilter")?.value || "הכל";
  const filtered = leads.filter(l => {
    const query = q.trim().toLowerCase();
    const matchesQuery = !query || l.fullName.toLowerCase().includes(query) || l.phone.includes(query) || l.city.toLowerCase().includes(query) || l.email.toLowerCase().includes(query);
    return matchesQuery && (statusFilter === "הכל" || l.status === statusFilter) && (ownerFilter === "הכל" || l.ownerId === ownerFilter);
  });

  document.getElementById("leads").innerHTML = `
    <div class="grid leads-layout">
      <div class="grid">
        <div class="card">
          <h3>הוספת ליד חדש מהטופס / ידנית</h3>
          <div class="form-grid">
            <input id="newFullName" placeholder="שם מלא">
            <input id="newPhone" placeholder="טלפון">
            <input id="newEmail" placeholder="אימייל">
            <input id="newCity" placeholder="עיר / אזור">
            <input id="newProduct" placeholder="מוצר / שירות" style="grid-column:1/-1">
          </div>
          <button class="btn" style="margin-top:12px" onclick="addLead()">הוספה וחלוקה אוטומטית</button>
        </div>

        <div class="card">
          <div class="filters">
            <input id="leadSearch" value="${escapeHtml(q)}" oninput="renderLeads()" placeholder="חיפוש לפי שם, טלפון, אימייל או עיר">
            <select id="leadStatusFilter" onchange="renderLeads()">
              <option>הכל</option>${statuses.map(s => `<option ${s === statusFilter ? "selected" : ""}>${s}</option>`).join("")}
            </select>
            <select id="leadOwnerFilter" onchange="renderLeads()">
              <option value="הכל">כל העובדים</option>${workers.map(w => `<option value="${w.id}" ${w.id === ownerFilter ? "selected" : ""}>${w.name}</option>`).join("")}
            </select>
          </div>
          <div class="lead-list">
            ${filtered.length ? filtered.map(l => `
              <button class="lead-row ${l.id === selectedLeadId ? "selected" : ""}" onclick="selectLead('${l.id}')">
                <div class="row-title">${escapeHtml(l.fullName)} <span class="${pillClass(l.status)}">${l.status}</span></div>
                <div class="row-meta">${escapeHtml(l.phone)} · ${escapeHtml(l.city)} · ${escapeHtml(l.product)}</div>
                <div class="row-meta">מטפל: ${getWorkerName(l.ownerId)} · מקור: ${escapeHtml(l.source)}</div>
              </button>
            `).join("") : `<div class="card">לא נמצאו לידים</div>`}
          </div>
        </div>
      </div>

      <div class="details">
        ${selected ? `
        <div class="card">
          <div style="display:flex;justify-content:space-between;gap:12px;align-items:start">
            <div>
              <h3 style="font-size:26px">${escapeHtml(selected.fullName)}</h3>
              <div class="row-meta">${escapeHtml(selected.phone)} · ${escapeHtml(selected.email)}</div>
            </div>
            <span class="${pillClass(selected.status)}">${selected.status}</span>
          </div>

          <div class="info-grid" style="margin-top:16px">
            <div>עיר: <b>${escapeHtml(selected.city)}</b></div>
            <div>מוצר: <b>${escapeHtml(selected.product)}</b></div>
            <div>עובד מטפל: <b>${getWorkerName(selected.ownerId)}</b></div>
            <div>תאריך פנייה: <b>${formatDate(selected.createdAt)}</b></div>
            <div>Follow-up: <b>${formatDate(selected.followUpAt)}</b></div>
            <div>פעולה אחרונה: <b>${escapeHtml(selected.lastAction)}</b></div>
          </div>

          <div class="form-grid" style="margin-top:16px">
            <label>שינוי סטטוס
              <select onchange="updateLead('${selected.id}', {status:this.value,lastAction:'סטטוס עודכן ל-' + this.value})">
                ${statuses.map(s => `<option ${s === selected.status ? "selected" : ""}>${s}</option>`).join("")}
              </select>
            </label>
            <label>תאריך Follow-up
              <input type="date" value="${selected.followUpAt}" onchange="updateLead('${selected.id}', {followUpAt:this.value,lastAction:'עודכן Follow-up'})">
            </label>
          </div>

          <div class="actions">
            <button class="btn green" onclick="sendWhatsapp('${selected.id}')">שליחת WhatsApp</button>
            <button class="btn secondary" onclick="closeLead('${selected.id}')">סימון כסגור</button>
          </div>

          <div style="margin-top:16px">
            <h3>הוספת הערה</h3>
            <textarea id="newNote" placeholder="כתבי הערה על הליד..."></textarea>
            <button class="btn" style="margin-top:8px" onclick="addNote('${selected.id}')">שמירת הערה</button>
          </div>

          <div style="margin-top:16px">
            <h3>היסטוריית הערות ופעולות</h3>
            <div class="notes">${selected.notes.map(n => `<div class="note">${escapeHtml(n)}</div>`).join("")}</div>
          </div>
        </div>` : `<div class="card">בחרי ליד</div>`}
      </div>
    </div>`;
}
function selectLead(id) {
  selectedLeadId = id;
  renderLeads();
}
function updateLead(id, changes) {
  leads = leads.map(l => l.id === id ? { ...l, ...changes } : l);
  save();
  render();
}
function addNote(id) {
  const text = document.getElementById("newNote")?.value.trim();
  if (!text) return;
  const timestamp = new Date().toLocaleString("he-IL");
  leads = leads.map(l => l.id === id ? { ...l, notes:[`${timestamp}: ${text}`, ...l.notes], lastAction:"נוספה הערה חדשה" } : l);
  save();
  render();
}
function sendWhatsapp(id) {
  const timestamp = new Date().toLocaleString("he-IL");
  leads = leads.map(l => l.id === id ? { ...l, notes:[`${timestamp}: נשלחה הודעת וואטסאפ ללקוח`, ...l.notes], lastAction:"נשלחה הודעת וואטסאפ", status:l.status === "חדש" ? "בטיפול" : l.status } : l);
  save();
  render();
}
function closeLead(id) {
  updateLead(id, { status:"נסגר / נמכר", saleAmount:3500, lastAction:"סומן כנסגר" });
}
function addLead() {
  const fullName = document.getElementById("newFullName").value.trim();
  const phone = document.getElementById("newPhone").value.trim();
  if (!fullName || !phone) return alert("צריך שם וטלפון");
  const activeWorkers = workers.filter(w => w.active);
  const assigned = activeWorkers[nextWorkerIndex % activeWorkers.length];
  nextWorkerIndex++;
  const id = "L-" + (1001 + leads.length);
  leads = [{
    id,
    fullName,
    phone,
    email: document.getElementById("newEmail").value.trim(),
    city: document.getElementById("newCity").value.trim(),
    source: LEAD_SOURCE,
    product: document.getElementById("newProduct").value.trim() || "לא צוין",
    status:"חדש",
    ownerId: assigned.id,
    createdAt: today,
    followUpAt: today,
    notes:[`ליד חדש נוסף וחולק אוטומטית אל ${assigned.name}`],
    lastAction:"ליד חדש נכנס מהטופס",
    saleAmount:0
  }, ...leads];
  selectedLeadId = id;
  save();
  renderLeads();
}
function renderFollowups() {
  const items = leads.filter(l => l.followUpAt && l.status !== "נסגר / נמכר").sort((a,b) => a.followUpAt.localeCompare(b.followUpAt));
  document.getElementById("followups").innerHTML = `
    <div class="card">
      <h3>תזכורות לחזרה ללקוחות</h3>
      <div class="lead-list">
        ${items.length ? items.map(l => `
          <div class="lead-row">
            <div class="row-title">${escapeHtml(l.fullName)} <span class="${pillClass(l.status)}">${l.status}</span></div>
            <div class="row-meta">לחזור בתאריך ${formatDate(l.followUpAt)} · מטפל: ${getWorkerName(l.ownerId)}</div>
            <button class="btn" style="margin-top:10px" onclick="selectedLeadId='${l.id}';showScreen('leads')">פתיחת ליד</button>
          </div>
        `).join("") : "אין תזכורות פתוחות"}
      </div>
    </div>`;
}
function renderTasks() {
  const statusFilter = document.getElementById("taskStatusFilter")?.value || "הכל";
  const ownerFilter = document.getElementById("taskOwnerFilter")?.value || "הכל";
  const filtered = tasks
    .filter(t => statusFilter === "הכל" || t.status === statusFilter)
    .filter(t => ownerFilter === "הכל" || t.ownerId === ownerFilter)
    .sort((a,b) => a.dueDate.localeCompare(b.dueDate));
  const tm = taskMetrics();

  document.getElementById("tasks").innerHTML = `
    <div class="grid tasks-layout">
      <div class="card">
        <h3>יצירת משימה חדשה</h3>
        <p class="row-meta">שיוך משימות לעובדים, ללידים ולדדליינים.</p>
        <div class="grid">
          <input id="taskTitle" placeholder="כותרת משימה">
          <textarea id="taskDescription" placeholder="פירוט המשימה"></textarea>
          <div class="form-grid">
            <label>אחראי
              <select id="taskOwner">${workers.map(w => `<option value="${w.id}">${w.name}</option>`).join("")}</select>
            </label>
            <label>עדיפות
              <select id="taskPriority"><option>נמוכה</option><option selected>בינונית</option><option>גבוהה</option></select>
            </label>
            <label>ליד מקושר
              <select id="taskLead"><option value="">ללא ליד מקושר</option>${leads.map(l => `<option value="${l.id}">${escapeHtml(l.fullName)}</option>`).join("")}</select>
            </label>
            <label>תאריך יעד
              <input id="taskDueDate" type="date" value="${today}">
            </label>
          </div>
          <button class="btn" onclick="addTask()">הוספת משימה</button>
        </div>
        <div class="grid stats" style="margin-top:16px">
          ${stat("כל המשימות", tm.total)}
          ${stat("פתוחות", tm.open)}
          ${stat("הושלמו", tm.completed)}
        </div>
      </div>
      <div class="card">
        <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px">
          <div><h3>רשימת משימות</h3><p class="row-meta">מעקב לפי אחראי, סטטוס ודדליין.</p></div>
          <div class="top-actions">
            <select id="taskStatusFilter" onchange="renderTasks()"><option>הכל</option><option ${statusFilter==="פתוחה"?"selected":""}>פתוחה</option><option ${statusFilter==="בתהליך"?"selected":""}>בתהליך</option><option ${statusFilter==="הושלמה"?"selected":""}>הושלמה</option></select>
            <select id="taskOwnerFilter" onchange="renderTasks()"><option value="הכל">כל העובדים</option>${workers.map(w => `<option value="${w.id}" ${ownerFilter===w.id?"selected":""}>${w.name}</option>`).join("")}</select>
          </div>
        </div>
        <div class="task-list">
          ${filtered.length ? filtered.map(t => `
            <div class="task-row">
              <div class="row-title">${escapeHtml(t.title)} <span class="${pillClass(t.status)}">${t.status}</span> <span class="pill">עדיפות ${t.priority}</span></div>
              ${t.description ? `<div class="row-meta">${escapeHtml(t.description)}</div>` : ""}
              <div class="row-meta">אחראי: ${getWorkerName(t.ownerId)} · ליד: ${getLeadName(t.relatedLeadId)} · יעד: ${formatDate(t.dueDate)}</div>
              <div class="top-actions" style="margin-top:10px">
                <select onchange="updateTask('${t.id}', {status:this.value})"><option ${t.status==="פתוחה"?"selected":""}>פתוחה</option><option ${t.status==="בתהליך"?"selected":""}>בתהליך</option><option ${t.status==="הושלמה"?"selected":""}>הושלמה</option></select>
                <button class="btn secondary" onclick="updateTask('${t.id}', {status:'הושלמה'})">סמן כהושלמה</button>
              </div>
            </div>
          `).join("") : "אין משימות להצגה"}
        </div>
      </div>
    </div>`;
}
function addTask() {
  const title = document.getElementById("taskTitle").value.trim();
  if (!title) return alert("צריך כותרת משימה");
  tasks = [{
    id: "T-" + (2001 + tasks.length),
    title,
    description: document.getElementById("taskDescription").value.trim(),
    ownerId: document.getElementById("taskOwner").value,
    relatedLeadId: document.getElementById("taskLead").value,
    status: "פתוחה",
    priority: document.getElementById("taskPriority").value,
    dueDate: document.getElementById("taskDueDate").value || today,
    createdAt: today
  }, ...tasks];
  save();
  renderTasks();
}
function updateTask(id, changes) {
  tasks = tasks.map(t => t.id === id ? { ...t, ...changes } : t);
  save();
  render();
}
function renderReports() {
  const m = metrics();
  document.getElementById("reports").innerHTML = `
    <div class="grid two">
      <div class="card">
        <h3>דוח יומי</h3>
        <div class="grid stats">
          ${stat("לידים היום", m.incomingToday)}
          ${stat("סגירות", m.closed)}
          ${stat("דורשים טיפול", m.dueFollowups)}
          ${stat("פתוחים", m.open)}
        </div>
      </div>
      <div class="card">
        <h3>דוח לפי מקור ליד</h3>
        <div class="lead-row">
          <div style="display:flex;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:10px"><b>טופס - דר אירית שחם</b><b>${leads.length} לידים</b></div>
          <div class="row-meta">סגירות: <b>${m.closed}</b></div>
          <div class="row-meta">אחוז המרה: <b>${m.conversionRate}%</b></div>
          <div class="row-meta">מכירות: <b>₪${m.totalSales.toLocaleString("he-IL")}</b></div>
        </div>
      </div>
    </div>`;
}
function renderTeam() {
  document.getElementById("team").innerHTML = `
    <div class="card">
      <h3>11 עובדים והרשאות בסיסיות</h3>
      <div class="grid stats">
        ${workers.map(w => `
          <div class="worker-row">
            <b>${w.name}</b>
            <div class="row-meta">${w.role}</div>
            <div class="row-meta">צפייה: כל הלידים</div>
            <div class="row-meta">עריכה: לפי הרשאה</div>
          </div>
        `).join("")}
      </div>
    </div>`;
}
function resetDemo() {
  if (!confirm("לאפס את נתוני הדמו?")) return;
  leads = structuredClone(initialLeads);
  tasks = structuredClone(initialTasks);
  selectedLeadId = leads[0]?.id || "";
  nextWorkerIndex = 9;
  save();
  render();
}
function render() {
  renderDashboard();
  renderLeads();
  renderFollowups();
  renderTasks();
  renderReports();
  renderTeam();
}
document.querySelectorAll(".nav button").forEach((button) => {
  button.addEventListener("click", () => showScreen(button.dataset.screen));
});

render();
</script>
</body>
</html>
